# ══════════════════════════════════════════════════════════════════════════════
#  ats-suite - default values
#
#  These defaults are a FAITHFUL transcription of docker-compose.demo.yml and the
#  raw manifests in deploy/k8s/*: the same 15 backend services + frontend, the
#  same ports, the same env, the same tuning flags on Postgres, and the same
#  probe targets on the real /healthz /livez /readyz endpoints that every backend
#  mounts (packages/common/src/lib/health.ts). The frontend has no /healthz and
#  is probed on "/", matching infra/Dockerfile.frontend.
#
#  This file is the "moderate" baseline (roughly the deploy/k8s posture). Layer
#  values-dev.yaml (1 replica, tiny resources, HPA off) or values-prod.yaml (HPA
#  on, higher hot-path minimums, PDBs, external datastores) on top with -f.
#
#  HONEST CAVEAT: this chart is DERIVED from the compose stack and has NOT been
#  applied to a live cluster. Resource requests/limits and HPA targets are
#  engineering estimates, not measured. Load-test, then tune. See README.md.
# ══════════════════════════════════════════════════════════════════════════════

# ── Global settings applied across every subresource ──────────────────────────
global:
  # Namespace is set at install time (helm --namespace / -n). Templates do NOT
  # hardcode a namespace so the release is portable.
  #
  # Image coordinates. Every service image is ghcr.io/cdc-ats/<service>:<tag>,
  # built by infra/Dockerfile.service --build-arg SERVICE=<service> (the frontend
  # by infra/Dockerfile.frontend). Override registry/tag globally, or per service
  # under services.<name>.image.
  image:
    registry: ghcr.io
    repository: cdc-ats
    # Default tag for ALL images; per-service image.tag overrides it. Pin to a
    # real CI tag in production instead of a floating "latest".
    tag: latest
    pullPolicy: IfNotPresent
  imagePullSecrets: []
  # A common label all managed objects carry (in addition to the standard
  # app.kubernetes.io/* set from _helpers.tpl).
  partOf: cdc-ats
  # Non-root securityContext applied to every app Pod/container unless a service
  # overrides it. Matches the "run as non-root" hardening the k8s README calls for.
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1001
    runAsGroup: 1001
    fsGroup: 1001
    seccompProfile:
      type: RuntimeDefault
  containerSecurityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false   # resume-service writes tesseract model + tmp
    runAsNonRoot: true
    capabilities:
      drop: ["ALL"]
  # Default rolling-update strategy for every backend Deployment (surge one, keep
  # the rest serving during a rollout).
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1

# ── Non-secret shared env (the compose x-svc-env anchor, minus secrets) ────────
# Rendered into a single ConfigMap (cdc-ats-common) that every backend mounts via
# envFrom. Cross-service URLs resolve by k8s Service DNS - the Service name IS the
# DNS name, so these line up 1:1 with the compose service names.
commonEnv:
  NODE_ENV: "production"
  REDIS_URL: "redis://redis:6379"
  NATS_URL: "nats://nats:4222"
  # LLM endpoint is pluggable; defaults mirror the compose anchor. Override the
  # base URL / model here for Groq's free tier exactly as the compose comment
  # describes. The API key itself is a Secret (see secrets.openrouterApiKey).
  OPENROUTER_BASE_URL: "https://openrouter.ai/api/v1"
  AI_MODEL_OVERRIDE: ""
  AGENTIC_COPILOT: ""
  AGENTIC_RESUME_VERIFY: "0"
  RESUME_GITHUB_CORROBORATE: "0"
  CORS_ORIGIN: ""
  OTEL_DISABLED: "true"
  # Hardcoded in compose (not read from .env) so a low-balance key can screen.
  AGENT_MAX_OUTPUT_TOKENS: "8000"
  # Object-storage endpoint shared by resume-service + job-service (non-secret;
  # creds are in the Secret). Points at the in-cluster minio Service by default.
  S3_ENDPOINT: "http://minio:9000"
  S3_REGION: "us-east-1"
  S3_FORCE_PATH_STYLE: "true"
  # Cross-service base URLs are injected automatically by the helper from the
  # service list (so you never hand-maintain 14 URLs). Add extra literal keys
  # here if you need to override one.

# ── Secrets (values-injected; NEVER commit real values) ────────────────────────
# Rendered into a Secret (cdc-ats-secrets). The defaults below are the SAME weak
# demo placeholders docker-compose.demo.yml uses (the ${VAR:-default} fallbacks) -
# they are NOT production secrets. REPLACE every one before a real deploy, ideally
# by NOT setting them here at all and instead using an existing Secret
# (secrets.existingSecret) populated by your secrets manager / sealed-secrets /
# external-secrets. When existingSecret is set, the inline values below are ignored.
secrets:
  # If set, the chart references THIS pre-existing Secret and renders no Secret of
  # its own. It MUST contain all the keys listed below (same names).
  existingSecret: ""
  # ── Shared auth / crypto (demo defaults - REPLACE) ──
  jwtSecret: "demo-jwt-secret-min-32-chars-change-me-0123456789"
  internalServiceToken: "demo-internal-service-token"
  # api-gateway EMBED_SECRET + notification/assessment ATS_CONFIG_ENC_KEY.
  # Generate real values: `openssl rand -base64 48` and `openssl rand -hex 32`.
  embedSecret: "REPLACE-with-openssl-rand-base64-48"
  atsConfigEncKey: "REPLACE-with-openssl-rand-hex-32"
  # ── LLM provider keys (optional; empty in demo) ──
  openrouterApiKey: ""
  anthropicApiKey: ""
  openaiApiKey: ""
  # ── MinIO / S3 credentials (demo defaults - REPLACE) ──
  s3AccessKeyId: "minioadmin"
  s3SecretAccessKey: "minioadmin"
  # ── Postgres superuser password (consumed by the in-chart postgres) ──
  postgresPassword: "postgres"
  # ── Per-service DATABASE_URLs ──
  # By default these are BUILT automatically from postgres.* (host/port/user/pass)
  # + each service's dbName, so you only maintain them in ONE place. Set
  # databaseUrls.<KEY> to override a single one (e.g. to point a service at managed
  # Postgres, or to add ?connection_limit=... pool params). job-service's pool
  # params are applied via services.job (see jobDbConnectionLimit) so its
  # JOB_DATABASE_URL carries ?connection_limit=N&pool_timeout=20 like compose.
  databaseUrls: {}
    # IDENTITY_DATABASE_URL: postgresql://user:pass@host:5432/identity_db
    # ...

# ── The stateful backing stores ────────────────────────────────────────────────
# Each block has an `internal` toggle. internal:true deploys the in-chart
# StatefulSet (faithful to compose, single replica, PVC). internal:false deploys
# NOTHING for that component - you provide an external endpoint via the fields
# below (and, for Postgres, per-service DATABASE_URLs via secrets.databaseUrls).
postgres:
  internal: true
  # Used to BUILD the per-service DATABASE_URLs when secrets.databaseUrls is empty.
  # For external Postgres set internal:false and point host/port/user/password (or
  # override the URLs directly in secrets.databaseUrls).
  host: postgres
  port: 5432
  user: postgres
  # password comes from secrets.postgresPassword.
  image:
    repository: postgres
    tag: "16-alpine"
    pullPolicy: IfNotPresent
  # The demo compose tuning flags, verbatim (safe headroom for a burst).
  tuning:
    max_connections: "400"
    shared_buffers: "512MB"
    work_mem: "8MB"
    maintenance_work_mem: "128MB"
    wal_buffers: "32MB"
    max_wal_size: "4GB"
    min_wal_size: "1GB"
    checkpoint_completion_target: "0.9"
    effective_cache_size: "2GB"
  persistence:
    enabled: true
    storageClass: ""       # "" uses the cluster default StorageClass
    size: 20Gi
    accessModes: ["ReadWriteOnce"]
  resources:
    requests: { cpu: 250m, memory: 512Mi }
    limits:   { cpu: "2",  memory: 2Gi }
  # The one-database-per-service list. The init ConfigMap CREATE DATABASEs these,
  # and (when databaseUrls is empty) each service's URL is built as
  # postgresql://user:pass@host:port/<dbName>. Includes onboarding_db, which the
  # compose postgres-init creates even though no onboarding-service is deployed.
  databases:
    - identity_db
    - tenant_db
    - billing_db
    - job_db
    - candidate_db
    - interview_db
    - resume_db
    - screening_db
    - notification_db
    - search_db
    - agent_db
    - analytics_db
    - compliance_db
    - assessment_db
    - onboarding_db

redis:
  internal: true
  # For external Redis (ElastiCache/MemoryStore) set internal:false and put the
  # endpoint into commonEnv.REDIS_URL (redis://host:6379).
  host: redis
  port: 6379
  image:
    repository: redis
    tag: "7-alpine"
    pullPolicy: IfNotPresent
  persistence:
    enabled: true
    storageClass: ""
    size: 5Gi
    accessModes: ["ReadWriteOnce"]
  resources:
    requests: { cpu: 100m, memory: 128Mi }
    limits:   { cpu: 500m, memory: 512Mi }

nats:
  internal: true
  host: nats
  clientPort: 4222
  monitorPort: 8222
  image:
    repository: nats
    tag: "2.10-alpine"
    pullPolicy: IfNotPresent
  persistence:
    enabled: true
    storageClass: ""
    size: 5Gi
    accessModes: ["ReadWriteOnce"]
  resources:
    requests: { cpu: 100m, memory: 128Mi }
    limits:   { cpu: 500m, memory: 512Mi }

minio:
  internal: true
  host: minio
  apiPort: 9000
  consolePort: 9001
  image:
    repository: minio/minio
    tag: "latest"
    pullPolicy: IfNotPresent
  # mc image for the one-shot bucket-creation Job.
  mcImage:
    repository: minio/mc
    tag: "latest"
    pullPolicy: IfNotPresent
  # Buckets created by the setup Job (matches compose minio-setup).
  buckets:
    - resumes
    - ats-incoming
  persistence:
    enabled: true
    storageClass: ""
    size: 20Gi
    accessModes: ["ReadWriteOnce"]
  resources:
    requests: { cpu: 100m, memory: 256Mi }
    limits:   { cpu: "1",  memory: 1Gi }

# ── Migrator + seeder (Helm hook Jobs) ─────────────────────────────────────────
# The migrator runs `bash infra/migrate.sh` from the tools image
# (infra/Dockerfile.tools) as a pre-install/pre-upgrade hook, so every service's
# schema exists BEFORE the Deployments roll. The seeder runs `bash infra/seed.sh`
# as a post-install hook (creates the DEMO tenant/data over the gateway API) -
# OPTIONAL; disable it for a production deploy where you provision tenants yourself.
migrator:
  enabled: true
  image:
    repository: cdc-ats/tools     # ghcr.io/cdc-ats/tools:<tag>
    tag: latest
    pullPolicy: IfNotPresent
  backoffLimit: 3
  resources:
    requests: { cpu: 250m, memory: 512Mi }
    limits:   { cpu: "1",  memory: 1Gi }
  # Hook weight orders migrator (lower) before seeder (higher).
  hookWeight: "-5"

seeder:
  enabled: true
  image:
    repository: cdc-ats/tools
    tag: latest
    pullPolicy: IfNotPresent
  backoffLimit: 3
  resources:
    requests: { cpu: 100m, memory: 256Mi }
    limits:   { cpu: 500m, memory: 512Mi }
  hookWeight: "5"

# ── Ingress ────────────────────────────────────────────────────────────────────
# Replaces the demo's Cloudflare tunnel with a real Ingress. /api routes to the
# api-gateway; everything else to the frontend (the Next server also proxies
# same-origin /api to the gateway, so a single host works). Set your real host +
# TLS secret (or wire cert-manager via annotations).
ingress:
  enabled: true
  className: nginx
  host: app.cdc-ats.example.com
  annotations:
    # Allow large resume uploads through the ingress (multipart apply path).
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    # For cert-manager, add e.g.:
    # cert-manager.io/cluster-issuer: letsencrypt-prod
  tls:
    enabled: true
    secretName: cdc-ats-tls
  # Extra hosts (e.g. a dedicated api. host) can be appended here.
  extraHosts: []

# ── Monitoring ─────────────────────────────────────────────────────────────────
# Every backend exposes Prometheus metrics on /metrics on its HTTP port (the
# Deployments carry the prometheus.io/scrape pod annotations). When
# monitoring.enabled, the chart also emits a Prometheus-Operator ServiceMonitor
# per backend (requires the Prometheus Operator CRDs on the cluster).
monitoring:
  enabled: false
  serviceMonitor:
    interval: 30s
    scrapeTimeout: 10s
    # Label the operator's serviceMonitorSelector matches (set to your Prometheus
    # release label, e.g. release: kube-prometheus-stack).
    labels: {}

# ── PodDisruptionBudgets ───────────────────────────────────────────────────────
# When enabled, each backend/frontend gets a PDB so a voluntary disruption (node
# drain, rollout) never takes the service to zero. minAvailable is expressed as a
# per-service default; hot-path services override it in values-prod.yaml.
pdb:
  enabled: false
  # Default minAvailable for services that do not set their own. A percentage is
  # safest across variable replica counts.
  minAvailable: "50%"

# ── Autoscaling defaults ───────────────────────────────────────────────────────
# Global switch. Per-service autoscaling.* blocks (below) set the min/max/target.
# Only services with autoscaling.enabled:true get an HPA. The six hot-path
# deployables ship with sensible ranges (mirrors deploy/k8s/55-autoscalers.yaml).
autoscaling:
  enabled: false
  # Applied to the generated HPAs unless a service overrides them. autoscaling/v2
  # + metrics-server are REQUIRED on the cluster for CPU utilization to resolve.
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60

# ── KEDA (optional, per-worker queue-depth scaling) ────────────────────────────
# The three in-process BullMQ workers (job-service apply-ingest, resume-service
# parse, screening-service screener) scale correctly on CPU via the HPAs above.
# Under a DEEP backlog, CPU under-represents queue depth. When keda.enabled and a
# service sets keda.enabled:true, the chart emits a KEDA ScaledObject that scales
# that Deployment on Redis LIST/stream length instead (requires KEDA installed).
# This is a TOGGLE and a template - the Redis metric names are the BullMQ queue
# keys; verify them against your Redis before relying on them in production.
keda:
  enabled: false
  # Redis connection the ScaledObject's redis scaler uses. Defaults to the
  # in-chart redis. For a password-protected Redis, wire a TriggerAuthentication
  # (not templated here - documented in README).
  redisAddress: "redis:6379"
  cooldownPeriod: 300
  pollingInterval: 15

# ══════════════════════════════════════════════════════════════════════════════
#  SERVICES - one block per deployable. The templates range over this map.
#
#  Keys are the k8s object names (== compose service names == in-cluster DNS).
#  Each block:
#    port          container + Service port (the REAL compose port)
#    dbKey         the secrets.databaseUrls key + DB this service reads (backend
#                  only). Its DATABASE_URL is injected from the Secret. Services
#                  whose Prisma schema reads a NON-generic env (job-service reads
#                  JOB_DATABASE_URL) list it under extraDbEnv.
#    replicaCount  static replica count (ignored when autoscaling.enabled here)
#    resources     requests/limits (engineering estimates - tune)
#    healthPath    probe base ("/healthz|/livez|/readyz" for backends; "/" for FE)
#    autoscaling   per-service HPA range (only rendered when global + local enabled)
#    extraEnv      literal env pairs unique to this service
#    extraSecretEnv service-unique env sourced from the Secret
# ══════════════════════════════════════════════════════════════════════════════
services:

  api-gateway:
    port: 4000
    # No dbKey - the gateway is stateless (proxies to the backends).
    replicaCount: 2
    healthKind: backend
    resources:
      requests: { cpu: 200m, memory: 384Mi }
      limits:   { cpu: "1",  memory: 1Gi }
    extraEnv:
      # Trust the ingress/LB so Express derives req.ip from X-Forwarded-For - the
      # per-IP rate limiters collapse to one bucket without this (see SCALABILITY).
      TRUST_PROXY: "true"
    # Gateway-only secret env (EMBED_SECRET). Sourced from the chart Secret.
    extraSecretEnv:
      EMBED_SECRET: embedSecret
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 12
      targetCPUUtilizationPercentage: 60
    pdb:
      minAvailable: "50%"

  identity-service:
    port: 4001
    dbKey: IDENTITY_DATABASE_URL
    replicaCount: 1
    healthKind: backend
    resources:
      requests: { cpu: 100m, memory: 256Mi }
      limits:   { cpu: "1",  memory: 1Gi }

  tenant-service:
    port: 4002
    dbKey: TENANT_DATABASE_URL
    replicaCount: 1
    healthKind: backend
    resources:
      requests: { cpu: 100m, memory: 256Mi }
      limits:   { cpu: "1",  memory: 1Gi }

  billing-service:
    port: 4003
    dbKey: BILLING_DATABASE_URL
    replicaCount: 1
    healthKind: backend
    resources:
      requests: { cpu: 100m, memory: 256Mi }
      limits:   { cpu: "1",  memory: 1Gi }

  job-service:
    port: 4004
    dbKey: JOB_DATABASE_URL
    replicaCount: 2
    healthKind: backend
    resources:
      requests: { cpu: 150m, memory: 320Mi }
      limits:   { cpu: "1",  memory: 1Gi }
    # job-service's Prisma schema reads env("JOB_DATABASE_URL"), NOT the generic
    # DATABASE_URL - the helper sets BOTH to the same Secret value. The pool params
    # (?connection_limit=8&pool_timeout=20) are appended when the URL is built from
    # postgres.* (see jobDbConnectionLimit). Fast-path apply object storage:
    extraEnv:
      S3_INCOMING_BUCKET: "ats-incoming"
    # job-service reads JOB_DATABASE_URL in addition to DATABASE_URL - flagged so
    # the helper stamps the same Secret value onto both keys.
    aliasDbEnv: JOB_DATABASE_URL
    # Bounded Prisma pool params for the hottest apply-path service (compose sets
    # ?connection_limit=8&pool_timeout=20 on JOB_DATABASE_URL/DATABASE_URL). Only
    # applied when the URL is BUILT from postgres.* (secrets.databaseUrls empty).
    dbConnectionLimit: 8
    dbPoolTimeout: 20
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 16
      targetCPUUtilizationPercentage: 65
    pdb:
      minAvailable: "50%"

  candidate-service:
    port: 4005
    dbKey: CANDIDATE_DATABASE_URL
    replicaCount: 1
    healthKind: backend
    resources:
      requests: { cpu: 100m, memory: 256Mi }
      limits:   { cpu: "1",  memory: 1Gi }

  interview-service:
    port: 4006
    dbKey: INTERVIEW_DATABASE_URL
    replicaCount: 1
    healthKind: backend
    resources:
      requests: { cpu: 100m, memory: 256Mi }
      limits:   { cpu: "1",  memory: 1Gi }

  resume-service:
    port: 4007
    dbKey: RESUME_DATABASE_URL
    replicaCount: 2
    healthKind: backend
    resources:
      # Slightly higher ceiling - OCR + parse workers are the CPU-heaviest.
      requests: { cpu: 200m, memory: 512Mi }
      limits:   { cpu: "2",  memory: 2Gi }
    extraEnv:
      S3_BUCKET: "resumes"
      ENABLE_OCR: "true"
      RESUME_PARSE_CONCURRENCY: "8"
      RESUME_PARSE_RATE_MAX: "60"
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 12
      targetCPUUtilizationPercentage: 70
    # Parse/OCR pods are heavier to start - use a slightly longer scale-up window.
    autoscalingBehavior:
      scaleUp:
        stabilizationWindowSeconds: 60
        policies:
          - type: Percent
            value: 100
            periodSeconds: 60
          - type: Pods
            value: 3
            periodSeconds: 60
        selectPolicy: Max
      scaleDown:
        stabilizationWindowSeconds: 300
        policies:
          - type: Pods
            value: 1
            periodSeconds: 90
    pdb:
      minAvailable: "50%"
    # Opt-in KEDA queue-depth scaling on the resume parse queue.
    keda:
      enabled: false
      # BullMQ waiting-list key for the parse queue (verify against your Redis).
      listName: "bull:resume-parse:wait"
      listLength: "50"

  screening-service:
    port: 4008
    dbKey: SCREENING_DATABASE_URL
    replicaCount: 2
    healthKind: backend
    resources:
      requests: { cpu: 100m, memory: 256Mi }
      limits:   { cpu: "1",  memory: 1Gi }
    extraEnv:
      SCREENING_CONCURRENCY: "6"
      SCREENING_RATE_MAX: "30"
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 8
      targetCPUUtilizationPercentage: 70
    pdb:
      minAvailable: "50%"
    keda:
      enabled: false
      listName: "bull:candidate-screen:wait"
      listLength: "30"

  notification-service:
    port: 4009
    dbKey: NOTIFICATION_DATABASE_URL
    replicaCount: 1
    healthKind: backend
    resources:
      requests: { cpu: 100m, memory: 256Mi }
      limits:   { cpu: "1",  memory: 1Gi }
    # AES-256-GCM key encrypting TenantIntegration secrets at rest.
    extraSecretEnv:
      ATS_CONFIG_ENC_KEY: atsConfigEncKey

  search-service:
    port: 4010
    dbKey: SEARCH_DATABASE_URL
    replicaCount: 1
    healthKind: backend
    resources:
      requests: { cpu: 100m, memory: 256Mi }
      limits:   { cpu: "1",  memory: 1Gi }

  agent-service:
    port: 4011
    dbKey: AGENT_DATABASE_URL
    replicaCount: 1
    healthKind: backend
    resources:
      requests: { cpu: 100m, memory: 256Mi }
      limits:   { cpu: "1",  memory: 1Gi }

  analytics-service:
    port: 4012
    dbKey: ANALYTICS_DATABASE_URL
    replicaCount: 1
    healthKind: backend
    resources:
      requests: { cpu: 100m, memory: 256Mi }
      limits:   { cpu: "1",  memory: 1Gi }

  compliance-service:
    port: 4013
    dbKey: COMPLIANCE_DATABASE_URL
    replicaCount: 1
    healthKind: backend
    resources:
      requests: { cpu: 100m, memory: 256Mi }
      limits:   { cpu: "1",  memory: 1Gi }

  assessment-service:
    port: 4014
    dbKey: ASSESSMENT_DATABASE_URL
    replicaCount: 1
    healthKind: backend
    resources:
      requests: { cpu: 100m, memory: 256Mi }
      limits:   { cpu: "1",  memory: 1Gi }
    # AES-256-GCM key encrypting OA provider secrets at rest.
    extraSecretEnv:
      ATS_CONFIG_ENC_KEY: atsConfigEncKey
    autoscaling:
      enabled: true
      minReplicas: 1
      maxReplicas: 6
      targetCPUUtilizationPercentage: 70

# ── Frontend (Next.js) ─────────────────────────────────────────────────────────
# Separate block because it differs from the backends: no DATABASE_URL, no
# /healthz (probed on "/"), built by infra/Dockerfile.frontend, and it needs
# GATEWAY_ORIGIN (the server-side rewrite target). NEXT_PUBLIC_API_URL=/api is a
# BUILD arg baked into the image, not a runtime env.
frontend:
  enabled: true
  port: 3000
  replicaCount: 2
  image:
    # ghcr.io/cdc-ats/frontend:<tag> (global registry/repository/tag apply).
    repository: ""     # "" -> defaults to "<global.repository>/frontend"
    tag: ""            # "" -> global.image.tag
  gatewayOrigin: "http://api-gateway:4000"
  resources:
    requests: { cpu: 200m, memory: 384Mi }
    limits:   { cpu: "1",  memory: 1Gi }
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 8
    targetCPUUtilizationPercentage: 65
  pdb:
    minAvailable: "50%"
