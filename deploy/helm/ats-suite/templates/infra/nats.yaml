{{/*
  NATS 2.10 with JetStream - StatefulSet + headless Service. Deployed ONLY when
  nats.internal. Command `-js -sd /data -m 8222` (JetStream, persisted streams,
  monitoring port). The event bus for every tenant.*.* / platform.* subject. For a
  managed/operator NATS cluster set nats.internal:false and point commonEnv.NATS_URL.
*/}}
{{- if .Values.nats.internal }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.nats.host }}
  labels:
    {{- include "ats.componentLabels" (dict "name" "nats" "root" .) | nindent 4 }}
spec:
  clusterIP: None
  selector:
    {{- include "ats.selectorLabels" (dict "name" "nats" "instance" .Release.Name) | nindent 4 }}
  ports:
    - name: client
      port: {{ .Values.nats.clientPort }}
      targetPort: 4222
    - name: monitor
      port: {{ .Values.nats.monitorPort }}
      targetPort: 8222
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: nats
  labels:
    {{- include "ats.componentLabels" (dict "name" "nats" "root" .) | nindent 4 }}
spec:
  serviceName: {{ .Values.nats.host }}
  replicas: 1
  selector:
    matchLabels:
      {{- include "ats.selectorLabels" (dict "name" "nats" "instance" .Release.Name) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "ats.componentLabels" (dict "name" "nats" "root" .) | nindent 8 }}
    spec:
      containers:
        - name: nats
          image: {{ .Values.nats.image.repository }}:{{ .Values.nats.image.tag }}
          imagePullPolicy: {{ .Values.nats.image.pullPolicy }}
          args: ["-js", "-sd", "/data", "-m", "8222"]
          ports:
            - name: client
              containerPort: 4222
            - name: monitor
              containerPort: 8222
          volumeMounts:
            - name: data
              mountPath: /data
          # NATS exposes /healthz on the monitor port (8222).
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8222
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8222
            initialDelaySeconds: 20
            periodSeconds: 10
          resources:
            {{- toYaml .Values.nats.resources | nindent 12 }}
      {{- if not .Values.nats.persistence.enabled }}
      volumes:
        - name: data
          emptyDir: {}
      {{- end }}
  {{- if .Values.nats.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: {{ toYaml .Values.nats.persistence.accessModes | nindent 10 }}
        {{- if .Values.nats.persistence.storageClass }}
        storageClassName: {{ .Values.nats.persistence.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.nats.persistence.size }}
  {{- end }}
{{- end }}
