{{/*
  cdc-ats-secrets Secret - values-injected, NEVER a real secret in git.

  Rendered ONLY when .Values.secrets.existingSecret is empty. In production, set
  secrets.existingSecret to a Secret populated by your secrets manager
  (external-secrets / sealed-secrets / vault) and this template renders nothing.

  The per-service DATABASE_URLs are BUILT from postgres.* (host/port/user/pass +
  each service's db) unless overridden in secrets.databaseUrls. job-service's pool
  params are appended automatically (see ats.databaseUrl + services.job-service).
*/}}
{{- if not .Values.secrets.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: cdc-ats-secrets
  labels:
    {{- include "ats.labels" . | nindent 4 }}
type: Opaque
stringData:
  # ── Shared auth / crypto ──
  JWT_SECRET: {{ .Values.secrets.jwtSecret | quote }}
  INTERNAL_SERVICE_TOKEN: {{ .Values.secrets.internalServiceToken | quote }}
  EMBED_SECRET: {{ .Values.secrets.embedSecret | quote }}
  ATS_CONFIG_ENC_KEY: {{ .Values.secrets.atsConfigEncKey | quote }}
  # ── LLM provider keys (optional) ──
  OPENROUTER_API_KEY: {{ .Values.secrets.openrouterApiKey | quote }}
  ANTHROPIC_API_KEY: {{ .Values.secrets.anthropicApiKey | quote }}
  OPENAI_API_KEY: {{ .Values.secrets.openaiApiKey | quote }}
  # ── MinIO / S3 credentials ──
  S3_ACCESS_KEY_ID: {{ .Values.secrets.s3AccessKeyId | quote }}
  S3_SECRET_ACCESS_KEY: {{ .Values.secrets.s3SecretAccessKey | quote }}
  # ── Postgres superuser password (consumed by the in-chart postgres) ──
  POSTGRES_PASSWORD: {{ .Values.secrets.postgresPassword | quote }}
  # ── Per-service DATABASE_URLs (built from postgres.* or overridden) ──
  {{- range $name, $svc := .Values.services }}
  {{- if $svc.dbKey }}
  {{ $svc.dbKey }}: {{ include "ats.databaseUrl" (dict "svc" $svc "root" $) | quote }}
  {{- end }}
  {{- end }}
{{- end }}
