{{/*
  ServiceMonitor per backend - only when monitoring.enabled. Requires the
  Prometheus Operator CRDs (monitoring.coreos.com/v1) on the cluster. Each backend
  exposes /metrics on its HTTP port; this tells a Prometheus Operator to scrape it.
  The frontend has no /metrics endpoint, so it is not included.
*/}}
{{- if .Values.monitoring.enabled }}
{{- range $name, $svc := .Values.services }}
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ $name }}
  labels:
    {{- include "ats.componentLabels" (dict "name" $name "root" $) | nindent 4 }}
    {{- with $.Values.monitoring.serviceMonitor.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  selector:
    matchLabels:
      {{- include "ats.selectorLabels" (dict "name" $name "instance" $.Release.Name) | nindent 6 }}
  endpoints:
    - port: http
      path: /metrics
      interval: {{ $.Values.monitoring.serviceMonitor.interval }}
      scrapeTimeout: {{ $.Values.monitoring.serviceMonitor.scrapeTimeout }}
{{- end }}
{{- end }}
