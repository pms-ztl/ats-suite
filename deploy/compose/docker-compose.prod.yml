# ═══════════════════════════════════════════════════════════════════════════════
#  CDC ATS - SCALED SINGLE-HOST production compose (NGINX LB + PgBouncer + tuned PG)
#
#  For teams that want a scaled deployment WITHOUT Kubernetes: multiple replicas of
#  the hot-path services behind an NGINX load balancer, PgBouncer in front of a
#  tuned Postgres, on ONE host (Docker Compose or podman-compose). This is the
#  "scaled single-host" option referenced in docs/SCALABILITY.md §7.
#
#  ── HONEST SINGLE-HOST CAVEAT (read docs/SCALABILITY.md §7) ──────────────────
#  ONE host is still ONE host. This raises the ceiling a lot vs the demo (replicas
#  spread across cores, a connection pooler, tuned Postgres, a real LB) but it does
#  NOT reach the 10k-concurrent number the k8s topology targets, and it has NO
#  cross-host failover: if the host dies, everything dies. Postgres/Redis/NATS/MinIO
#  are single instances here. For genuine 10k + HA use deploy/k8s/ (+ HPAs) with a
#  managed/HA Postgres, Redis, and object store. Use THIS file for a beefy staging
#  box, a pilot, an air-gapped/Podman deployment, or a cost-capped production pilot.
#
#  ── HOW TO RUN ───────────────────────────────────────────────────────────────
#    cd deploy/compose
#    cp .env.prod.example .env            # fill in REAL secrets (never commit)
#    # build the images from the repo root context (compose points there):
#    docker compose -f docker-compose.prod.yml --env-file .env up -d --build
#    # scale a hot-path service on the fly (NGINX picks up replicas via DNS):
#    docker compose -f docker-compose.prod.yml up -d --scale job-service=4
#
#  Podman: `podman-compose -f docker-compose.prod.yml up -d` works for most of
#  this; see docs/DEPLOYMENT.md for the Quadlet alternative and podman caveats
#  (rootless port <1024, the internal judge0 network, healthcheck syntax).
#
#  ── WHAT DIFFERS FROM docker-compose.demo.yml (additive, does not touch it) ──
#    • NGINX in front of the frontend + gateway (the demo exposed them directly).
#    • Hot-path services (api-gateway, job, resume, screening, frontend) run with
#      `deploy.replicas` and NO host port - NGINX/Compose DNS load-balances them.
#    • PgBouncer (transaction pooling) sits in front of Postgres; app DB URLs point
#      at pgbouncer:6432, NOT postgres:5432. See the RLS/SET-LOCAL note below.
#    • No cloudflared tunnel, no judge0, no bulk OCR knobs turned up beyond safe.
#    • Secrets come from .env (required), never inline defaults.
# ═══════════════════════════════════════════════════════════════════════════════
name: cdc-ats-prod

# Shared service env - mirrors docker-compose.demo.yml x-svc-env, but app DB URLs
# point at PGBOUNCER (pgbouncer:6432), not postgres:5432, so every service's Prisma
# pool is multiplexed by the pooler. connection_limit is kept small per service so
# Σ(replicas × limit) stays well under PgBouncer MAX_CLIENT_CONN.
x-svc-env: &svc-env
  NODE_ENV: production
  REDIS_URL: redis://redis:6379
  NATS_URL: nats://nats:4222
  JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env}
  INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:?set INTERNAL_SERVICE_TOKEN in .env}
  OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
  OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
  AI_MODEL_OVERRIDE: ${AI_MODEL_OVERRIDE:-}
  AGENTIC_COPILOT: ${AGENTIC_COPILOT:-}
  AGENTIC_RESUME_VERIFY: ${AGENTIC_RESUME_VERIFY:-0}
  RESUME_GITHUB_CORROBORATE: ${RESUME_GITHUB_CORROBORATE:-0}
  ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  CORS_ORIGIN: ${CORS_ORIGIN:-}
  OTEL_DISABLED: "true"
  AGENT_MAX_OUTPUT_TOKENS: ${AGENT_MAX_OUTPUT_TOKENS:-8000}
  # Cross-service base URLs - identical in-network names to the demo.
  IDENTITY_SERVICE_URL: http://identity-service:4001
  TENANT_SERVICE_URL: http://tenant-service:4002
  BILLING_SERVICE_URL: http://billing-service:4003
  JOB_SERVICE_URL: http://job-service:4004
  CANDIDATE_SERVICE_URL: http://candidate-service:4005
  INTERVIEW_SERVICE_URL: http://interview-service:4006
  RESUME_SERVICE_URL: http://resume-service:4007
  SCREENING_SERVICE_URL: http://screening-service:4008
  NOTIFICATION_SERVICE_URL: http://notification-service:4009
  SEARCH_SERVICE_URL: http://search-service:4010
  AGENT_SERVICE_URL: http://agent-service:4011
  ANALYTICS_SERVICE_URL: http://analytics-service:4012
  COMPLIANCE_SERVICE_URL: http://compliance-service:4013
  ASSESSMENT_SERVICE_URL: http://assessment-service:4014
  # ── DB URLs → PgBouncer (pgbouncer:6432), NOT postgres:5432 ─────────────────
  # SESSION pooling by default (safe for the per-request SET app.current_tenant_id
  # that RLS uses). connection_limit small so the pooler is the real multiplexer.
  IDENTITY_DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@pgbouncer:6432/identity_db?connection_limit=${DB_CONN_LIMIT:-5}&pool_timeout=20
  TENANT_DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@pgbouncer:6432/tenant_db?connection_limit=${DB_CONN_LIMIT:-5}&pool_timeout=20
  BILLING_DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@pgbouncer:6432/billing_db?connection_limit=${DB_CONN_LIMIT:-5}&pool_timeout=20
  JOB_DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@pgbouncer:6432/job_db?connection_limit=${JOB_DB_CONN_LIMIT:-8}&pool_timeout=20
  CANDIDATE_DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@pgbouncer:6432/candidate_db?connection_limit=${DB_CONN_LIMIT:-5}&pool_timeout=20
  INTERVIEW_DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@pgbouncer:6432/interview_db?connection_limit=${DB_CONN_LIMIT:-5}&pool_timeout=20
  RESUME_DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@pgbouncer:6432/resume_db?connection_limit=${DB_CONN_LIMIT:-5}&pool_timeout=20
  SCREENING_DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@pgbouncer:6432/screening_db?connection_limit=${DB_CONN_LIMIT:-5}&pool_timeout=20
  NOTIFICATION_DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@pgbouncer:6432/notification_db?connection_limit=${DB_CONN_LIMIT:-5}&pool_timeout=20
  SEARCH_DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@pgbouncer:6432/search_db?connection_limit=${DB_CONN_LIMIT:-5}&pool_timeout=20
  AGENT_DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@pgbouncer:6432/agent_db?connection_limit=${DB_CONN_LIMIT:-5}&pool_timeout=20
  ANALYTICS_DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@pgbouncer:6432/analytics_db?connection_limit=${DB_CONN_LIMIT:-5}&pool_timeout=20
  COMPLIANCE_DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@pgbouncer:6432/compliance_db?connection_limit=${DB_CONN_LIMIT:-5}&pool_timeout=20
  ASSESSMENT_DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@pgbouncer:6432/assessment_db?connection_limit=${DB_CONN_LIMIT:-5}&pool_timeout=20

x-svc-build: &svc-build
  # Build context is the REPO ROOT (two levels up from this file), same as the demo.
  context: ../..
  dockerfile: infra/Dockerfile.service

x-svc-defaults: &svc-defaults
  restart: unless-stopped
  networks: [ats_net]
  depends_on:
    pgbouncer: { condition: service_healthy }
    redis: { condition: service_healthy }
    nats: { condition: service_started }
    migrator: { condition: service_completed_successfully }

networks:
  ats_net: { driver: bridge }

volumes:
  postgres_data:
  redis_data:
  nats_data:
  minio_data:

services:
  # ── Edge load balancer ──────────────────────────────────────────────────────
  # NGINX terminates client traffic and load-balances across frontend + gateway
  # replicas via Docker's embedded DNS (resolver 127.0.0.11). Config: ./nginx/.
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      frontend: { condition: service_started }
      api-gateway: { condition: service_started }
    ports:
      - "${HTTP_PORT:-80}:80"
      # TLS: mount certs into ./nginx/certs and enable the 443 server block.
      # - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    networks: [ats_net]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/nginx-health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Infrastructure ─────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: postgres
    # Same tuning philosophy as the demo (raise ceilings for a burst). Overridable
    # via .env for the host size; PgBouncer keeps the actual backend conns bounded,
    # so max_connections here is mostly headroom for the pooler + tooling.
    command:
      - "postgres"
      - "-c"
      - "max_connections=${PG_MAX_CONNECTIONS:-400}"
      - "-c"
      - "shared_buffers=${PG_SHARED_BUFFERS:-1GB}"
      - "-c"
      - "work_mem=${PG_WORK_MEM:-8MB}"
      - "-c"
      - "maintenance_work_mem=256MB"
      - "-c"
      - "wal_buffers=32MB"
      - "-c"
      - "max_wal_size=8GB"
      - "-c"
      - "min_wal_size=2GB"
      - "-c"
      - "checkpoint_completion_target=0.9"
      - "-c"
      - "effective_cache_size=${PG_EFFECTIVE_CACHE:-4GB}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Same DB-per-service init as the demo (creates all 15 databases).
      - ../../infra/postgres-init.sql:/docker-entrypoint-initdb.d/00-create-dbs.sql:ro
    networks: [ats_net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 20

  # ── PgBouncer - transaction/session pooling in front of Postgres ────────────
  # ── RLS SAFETY (do not skip) ────────────────────────────────────────────────
  # This stack scopes RLS with per-request tenant settings. In TRANSACTION pooling
  # a session-level `SET` leaks across pooled clients and BREAKS tenant isolation.
  # SESSION pooling is the SAFE DEFAULT below. Switch POOL_MODE=transaction ONLY
  # after confirming the tenant scoping uses `SET LOCAL` inside an explicit
  # transaction (the @cdc-ats/common rlsExtend/tenantContext path) - the same audit
  # documented in docker-compose.demo.yml. When unsure, keep session pooling.
  pgbouncer:
    image: edoburu/pgbouncer:latest
    restart: unless-stopped
    depends_on:
      postgres: { condition: service_healthy }
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: postgres
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      POOL_MODE: ${PGBOUNCER_POOL_MODE:-session}
      MAX_CLIENT_CONN: ${PGBOUNCER_MAX_CLIENT_CONN:-2000}
      DEFAULT_POOL_SIZE: ${PGBOUNCER_DEFAULT_POOL_SIZE:-25}
      # Allow the app to connect to any of the per-service DBs through the pooler.
      AUTH_TYPE: scram-sha-256
      IGNORE_STARTUP_PARAMETERS: extra_float_digits
    networks: [ats_net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 6432 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory ${REDIS_MAXMEMORY:-1gb} --maxmemory-policy noeviction
    volumes: [redis_data:/data]
    networks: [ats_net]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  nats:
    image: nats:2.10-alpine
    restart: unless-stopped
    command: ["-js", "-sd", "/data", "-m", "8222"]
    volumes: [nats_data:/data]
    networks: [ats_net]

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?set MINIO_ROOT_USER in .env}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD in .env}
    volumes: [minio_data:/data]
    networks: [ats_net]
    healthcheck:
      test: ["CMD-SHELL", "mc ready local || curl -fsS http://127.0.0.1:9000/minio/health/live || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

  minio-setup:
    image: minio/mc:latest
    restart: "no"
    depends_on:
      minio: { condition: service_started }
    networks: [ats_net]
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD; do echo waiting-for-minio; sleep 2; done;
      mc mb --ignore-existing local/resumes;
      mc mb --ignore-existing local/ats-incoming;
      echo minio-bucket-ready;
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}

  # ── One-shot: create every service's schema (runs against PgBouncer) ────────
  migrator:
    build: { context: ../.., dockerfile: infra/Dockerfile.tools }
    restart: "no"
    command: ["bash", "infra/migrate.sh"]
    networks: [ats_net]
    depends_on:
      pgbouncer: { condition: service_healthy }
    environment:
      # Prisma migrate/db-push does DDL; run it against Postgres DIRECTLY (5432),
      # NOT the pooler, so schema changes are not affected by pool mode.
      IDENTITY_DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/identity_db
      TENANT_DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/tenant_db
      BILLING_DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/billing_db
      JOB_DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/job_db
      CANDIDATE_DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/candidate_db
      INTERVIEW_DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/interview_db
      RESUME_DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/resume_db
      SCREENING_DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/screening_db
      NOTIFICATION_DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/notification_db
      SEARCH_DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/search_db
      AGENT_DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/agent_db
      ANALYTICS_DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/analytics_db
      COMPLIANCE_DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/compliance_db
      ASSESSMENT_DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/assessment_db

  # ── HOT-PATH backend services (replicated, no host port; NGINX/DNS balances) ─
  api-gateway:
    <<: *svc-defaults
    build: { <<: *svc-build, args: { SERVICE: api-gateway } }
    environment:
      <<: *svc-env
      PORT: "4000"
      EMBED_SECRET: ${EMBED_SECRET:?set EMBED_SECRET in .env}
      # Behind NGINX → trust the proxy so per-IP rate limits see the real client IP
      # (docs/SCALABILITY.md §3.1). With >1 replica, declare rate-limit-redis so the
      # ceilings are counted across replicas (honest gap noted in SCALABILITY §3.2).
      TRUST_PROXY: "true"
    deploy:
      replicas: ${GATEWAY_REPLICAS:-3}
    # NO ports: NGINX reaches it in-network on 4000 and load-balances the replicas.

  job-service:
    <<: *svc-defaults
    build: { <<: *svc-build, args: { SERVICE: job-service } }
    depends_on:
      pgbouncer: { condition: service_healthy }
      redis: { condition: service_healthy }
      nats: { condition: service_started }
      migrator: { condition: service_completed_successfully }
      minio-setup: { condition: service_completed_successfully }
    environment:
      <<: *svc-env
      PORT: "4004"
      # Fast-path apply object storage (same as the demo job-service block).
      S3_ENDPOINT: http://minio:9000
      S3_INCOMING_BUCKET: ats-incoming
      S3_REGION: us-east-1
      S3_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      S3_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      S3_FORCE_PATH_STYLE: "true"
    deploy:
      replicas: ${JOB_REPLICAS:-3}

  resume-service:
    build: { <<: *svc-build, args: { SERVICE: resume-service } }
    restart: unless-stopped
    networks: [ats_net]
    depends_on:
      pgbouncer: { condition: service_healthy }
      redis: { condition: service_healthy }
      nats: { condition: service_started }
      migrator: { condition: service_completed_successfully }
      minio-setup: { condition: service_completed_successfully }
    environment:
      <<: *svc-env
      PORT: "4007"
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: resumes
      S3_REGION: us-east-1
      S3_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      S3_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      S3_FORCE_PATH_STYLE: "true"
      ENABLE_OCR: "true"
      RESUME_PARSE_CONCURRENCY: ${RESUME_PARSE_CONCURRENCY:-8}
      RESUME_PARSE_RATE_MAX: ${RESUME_PARSE_RATE_MAX:-60}
    deploy:
      replicas: ${RESUME_REPLICAS:-2}

  screening-service:
    <<: *svc-defaults
    build: { <<: *svc-build, args: { SERVICE: screening-service } }
    environment:
      <<: *svc-env
      PORT: "4008"
      SCREENING_CONCURRENCY: ${SCREENING_CONCURRENCY:-6}
      SCREENING_RATE_MAX: ${SCREENING_RATE_MAX:-30}
    deploy:
      replicas: ${SCREENING_REPLICAS:-2}

  # ── CONTROL-PLANE / lower-traffic services (single replica by default) ──────
  identity-service:
    <<: *svc-defaults
    build: { <<: *svc-build, args: { SERVICE: identity-service } }
    environment: { <<: *svc-env, PORT: "4001" }

  tenant-service:
    <<: *svc-defaults
    build: { <<: *svc-build, args: { SERVICE: tenant-service } }
    environment: { <<: *svc-env, PORT: "4002" }

  billing-service:
    <<: *svc-defaults
    build: { <<: *svc-build, args: { SERVICE: billing-service } }
    environment: { <<: *svc-env, PORT: "4003" }

  candidate-service:
    <<: *svc-defaults
    build: { <<: *svc-build, args: { SERVICE: candidate-service } }
    environment: { <<: *svc-env, PORT: "4005" }

  interview-service:
    <<: *svc-defaults
    build: { <<: *svc-build, args: { SERVICE: interview-service } }
    environment: { <<: *svc-env, PORT: "4006" }

  notification-service:
    <<: *svc-defaults
    build: { <<: *svc-build, args: { SERVICE: notification-service } }
    environment:
      <<: *svc-env
      PORT: "4009"
      ATS_CONFIG_ENC_KEY: ${ATS_CONFIG_ENC_KEY:?set ATS_CONFIG_ENC_KEY in .env}

  search-service:
    <<: *svc-defaults
    build: { <<: *svc-build, args: { SERVICE: search-service } }
    environment: { <<: *svc-env, PORT: "4010" }

  agent-service:
    <<: *svc-defaults
    build: { <<: *svc-build, args: { SERVICE: agent-service } }
    environment: { <<: *svc-env, PORT: "4011" }

  analytics-service:
    <<: *svc-defaults
    build: { <<: *svc-build, args: { SERVICE: analytics-service } }
    environment: { <<: *svc-env, PORT: "4012" }

  compliance-service:
    <<: *svc-defaults
    build: { <<: *svc-build, args: { SERVICE: compliance-service } }
    environment: { <<: *svc-env, PORT: "4013" }

  assessment-service:
    <<: *svc-defaults
    build: { <<: *svc-build, args: { SERVICE: assessment-service } }
    environment:
      <<: *svc-env
      PORT: "4014"
      ATS_CONFIG_ENC_KEY: ${ATS_CONFIG_ENC_KEY}

  # ── Frontend (replicated; NGINX balances SSR + the /api proxy) ──────────────
  frontend:
    build:
      context: ../..
      dockerfile: infra/Dockerfile.frontend
      args:
        NEXT_PUBLIC_API_URL: /api
        GATEWAY_ORIGIN: http://api-gateway:4000
    restart: unless-stopped
    networks: [ats_net]
    environment:
      NODE_ENV: production
      # Server-side proxy target - the compose DNS name api-gateway round-robins
      # across the gateway replicas.
      GATEWAY_ORIGIN: http://api-gateway:4000
      PORT: "3000"
      HOSTNAME: 0.0.0.0
    deploy:
      replicas: ${FRONTEND_REPLICAS:-2}
    depends_on:
      api-gateway: { condition: service_started }

  # ── One-shot: seed demo data (OPTIONAL in prod - skip for a clean tenant) ───
  # Behind the `seed` profile so a plain `up` does NOT seed a production database.
  # Enable with: docker compose -f docker-compose.prod.yml --profile seed up seeder
  seeder:
    build: { context: ../.., dockerfile: infra/Dockerfile.tools }
    profiles: ["seed"]
    restart: "no"
    command: ["bash", "infra/seed.sh"]
    networks: [ats_net]
    depends_on:
      api-gateway: { condition: service_started }
    environment:
      API_URL: http://api-gateway:4000/api
      TENANT_DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/tenant_db
      BILLING_DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/billing_db
      IDENTITY_DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/identity_db
