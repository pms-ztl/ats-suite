# ═══════════════════════════════════════════════════════════════════════════════
#  NGINX edge for the scaled single-host CDC ATS (deploy/compose/docker-compose.prod.yml)
#
#  Fronts the REPLICATED frontend + api-gateway. Docker Compose's embedded DNS
#  (127.0.0.11) returns ALL replica IPs for a service name; the `resolver` +
#  variable-in-proxy_pass trick below makes NGINX re-resolve on each request so it
#  load-balances across replicas AND picks up scale up/down without a reload.
#
#  Routing:
#    /api/*  → api-gateway:4000   (the single API entrypoint)
#    /*      → frontend:3000      (Next.js SSR + its own /api rewrite for browser)
#
#  Both the browser (NEXT_PUBLIC_API_URL=/api) and the frontend server
#  (GATEWAY_ORIGIN) can reach the API; sending /api straight to the gateway here
#  keeps API bytes off the SSR process. X-Forwarded-* is set so the gateway's
#  `trust proxy` (TRUST_PROXY=true) derives the real client IP for rate limiting
#  (docs/SCALABILITY.md §3.1).
#
#  HONEST: this is HTTP on :80. For production, terminate TLS - mount certs into
#  ./certs and enable the commented 443 server block (or put this behind a cloud
#  LB / Cloudflare that terminates TLS). No real certs are committed.
# ═══════════════════════════════════════════════════════════════════════════════
worker_processes auto;

events {
  worker_connections 4096;
}

http {
  # Large apply bursts + resume metadata: keep upstream connections efficient.
  sendfile on;
  tcp_nopush on;
  keepalive_timeout 65;

  # The public accept-fast apply posts JSON (the resume goes DIRECT to object
  # storage via a presigned URL, NOT through here - docs/SCALABILITY.md §2). The
  # LEGACY multipart apply fallback DOES stream the file through the gateway, so
  # allow a resume-sized body. Tune to your max resume size.
  client_max_body_size 15m;
  client_body_timeout 60s;

  # Docker's embedded DNS. `valid=10s` re-resolves so scaled replicas are picked
  # up; `ipv6=off` avoids AAAA lookups on the bridge network.
  resolver 127.0.0.11 valid=10s ipv6=off;

  # Basic access log to stdout (captured by `docker compose logs nginx`).
  log_format main '$remote_addr - $status "$request" '
                  'upstream=$upstream_addr rt=$request_time urt=$upstream_response_time';
  access_log /dev/stdout main;
  error_log  /dev/stderr warn;

  # Per-client-IP rate limit at the edge (defense in depth; the gateway also
  # limits). 50 r/s sustained with a burst; tune for your campaign volume.
  limit_req_zone $binary_remote_addr zone=perip:10m rate=50r/s;

  server {
    listen 80;
    server_name _;

    # LB health endpoint (used by the compose healthcheck + external LBs).
    location = /nginx-health {
      access_log off;
      return 200 "ok\n";
      add_header Content-Type text/plain;
    }

    # ── API → gateway replicas ────────────────────────────────────────────────
    location /api/ {
      # Variable target forces per-request DNS re-resolution → round-robins the
      # gateway replicas and survives scale changes without an NGINX reload.
      set $api_upstream http://api-gateway:4000;
      proxy_pass $api_upstream;

      limit_req zone=perip burst=100 nodelay;

      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Connection "";

      # SSE endpoints (in-app messaging / notifications) must not be buffered.
      proxy_buffering off;
      proxy_read_timeout 3600s;
    }

    # ── Everything else → frontend replicas ──────────────────────────────────
    location / {
      set $fe_upstream http://frontend:3000;
      proxy_pass $fe_upstream;

      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_read_timeout 300s;
    }
  }

  # ── TLS server (enable after mounting real certs into ./certs) ──────────────
  # server {
  #   listen 443 ssl http2;
  #   server_name your.domain.example;
  #   ssl_certificate     /etc/nginx/certs/fullchain.pem;
  #   ssl_certificate_key /etc/nginx/certs/privkey.pem;
  #   ssl_protocols TLSv1.2 TLSv1.3;
  #   # ... duplicate the /api/ and / location blocks from the :80 server above ...
  # }
}
