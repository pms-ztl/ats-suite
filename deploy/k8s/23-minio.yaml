# MinIO object storage + one-shot bucket setup (mirrors the `minio` and
# `minio-setup` services in docker-compose.demo.yml:176-198).
#
# resume-service stores resumes in the `resumes` bucket; job-service's fast-path
# apply uploads to `ats-incoming`. The setup Job creates both buckets (idempotent
# `mc mb --ignore-existing`), matching the compose minio-setup entrypoint.
apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: cdc-ats
  labels:
    app.kubernetes.io/name: minio
    app.kubernetes.io/part-of: cdc-ats
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: minio
  ports:
    - name: s3
      port: 9000
      targetPort: 9000
    - name: console
      port: 9001
      targetPort: 9001
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: minio
  namespace: cdc-ats
  labels:
    app.kubernetes.io/name: minio
    app.kubernetes.io/part-of: cdc-ats
spec:
  serviceName: minio
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: minio
  template:
    metadata:
      labels:
        app.kubernetes.io/name: minio
        app.kubernetes.io/part-of: cdc-ats
    spec:
      containers:
        - name: minio
          image: minio/minio:latest
          # Compose command: server /data --console-address ":9001"
          args: ["server", "/data", "--console-address", ":9001"]
          ports:
            - name: s3
              containerPort: 9000
            - name: console
              containerPort: 9001
          env:
            # Compose uses static minioadmin/minioadmin; here they come from the
            # Secret (S3_ACCESS_KEY_ID / S3_SECRET_ACCESS_KEY) so cluster + app
            # share one source of truth.
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef: { name: cdc-ats-secrets, key: S3_ACCESS_KEY_ID }
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef: { name: cdc-ats-secrets, key: S3_SECRET_ACCESS_KEY }
          volumeMounts:
            - name: data
              mountPath: /data
          # Compose has no explicit healthcheck on minio; MinIO exposes a live
          # probe at /minio/health/live on the S3 port.
          readinessProbe:
            httpGet:
              path: /minio/health/live
              port: 9000
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /minio/health/live
              port: 9000
            initialDelaySeconds: 20
            periodSeconds: 15
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits:   { cpu: "1",  memory: 1Gi }
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 20Gi
---
# One-shot bucket creation (mirrors compose `minio-setup`).
apiVersion: batch/v1
kind: Job
metadata:
  name: minio-setup
  namespace: cdc-ats
  labels:
    app.kubernetes.io/name: minio-setup
    app.kubernetes.io/part-of: cdc-ats
spec:
  backoffLimit: 10
  template:
    metadata:
      labels:
        app.kubernetes.io/name: minio-setup
        app.kubernetes.io/part-of: cdc-ats
    spec:
      restartPolicy: OnFailure
      containers:
        - name: mc
          image: minio/mc:latest
          env:
            - name: S3_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef: { name: cdc-ats-secrets, key: S3_ACCESS_KEY_ID }
            - name: S3_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef: { name: cdc-ats-secrets, key: S3_SECRET_ACCESS_KEY }
          command: ["/bin/sh", "-c"]
          # Same script as the compose minio-setup entrypoint.
          args:
            - |
              until mc alias set local http://minio:9000 "$S3_ACCESS_KEY_ID" "$S3_SECRET_ACCESS_KEY"; do
                echo waiting-for-minio; sleep 2;
              done;
              mc mb --ignore-existing local/resumes;
              mc mb --ignore-existing local/ats-incoming;
              echo minio-bucket-ready;
