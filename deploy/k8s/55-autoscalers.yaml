# HorizontalPodAutoscalers for the hot-path HTTP deployables - additive.
#
# ── Honest status (read this first) ───────────────────────────────────────────
# These HPAs are DERIVED FROM the compose-translated Deployments in this tree and
# have NOT been applied to, or tested against, a live cluster (same caveat as the
# rest of deploy/k8s - see README.md "Honest status"). Treat them as a tuned
# starting point: the CPU target percentages, the min/max replica bounds, and the
# scaling behavior windows are engineering estimates chosen to justify the 10k
# story in docs/SCALABILITY.md, NOT numbers measured against real production load.
# Load-test, then tune.
#
# ── Requirements this manifest assumes ────────────────────────────────────────
#   • autoscaling/v2 (Kubernetes 1.23+ ships it GA). If your cluster is older,
#     drop `behavior` (added in v2) or pin the API version it supports.
#   • metrics-server MUST be installed for the CPU-utilization metric to resolve;
#     without it every HPA reports `<unknown>` targets and will not scale. This is
#     a cluster add-on, not something these manifests can provide.
#   • Every target Deployment MUST declare CPU `resources.requests` (they all do)
#     - HPA computes utilization as a percentage OF THE REQUEST, so a missing
#     request makes the CPU metric unusable.
#
# ── Division of labour: THIS file (CPU HPAs) vs 60-keda-scaledobjects.yaml ─────
# The four QUEUE-DRIVEN Deployments - job-service, resume-service,
# screening-service, assessment-service - are now scaled by KEDA on BullMQ Redis
# queue depth (the metric a CPU HPA cannot see) in 60-keda-scaledobjects.yaml. Their
# CPU HPAs USED to live here and have been REMOVED, because a plain HPA and a KEDA
# ScaledObject on the SAME Deployment fight over the one HPA object. KEDA folds a CPU
# trigger into its ScaledObject so those services still scale on MAX(queue-depth,
# CPU) via the single HPA KEDA manages.
#
# What remains here are the pure HTTP surfaces with NO in-process queue worker, so a
# CPU HPA is the correct and sufficient signal:
#   • frontend        - every browser session (SSR + the Next proxy to the gateway)
#   • api-gateway     - the single public ingress; ALL /api/* traffic funnels here
#   • identity-service  - login/token verify; every authenticated session hits it
#   • tenant-service    - tenant/plan/branding resolution on the request path
#   • billing-service   - plan-gate + entitlement checks in front of AI + writes
#   • candidate-service - candidate/application reads+writes (the apply spike lands
#                         Candidate rows here via job-service; browse is read-hot)
#   • interview-service - scheduling + interview-room reads on the recruiter path
# Stateful infra (Postgres/Redis/NATS/MinIO/PgBouncer) and the remaining low-traffic
# services (search/agent/analytics/compliance) are NOT autoscaled here; add HPAs once
# you have measured a need. Postgres in particular does NOT autoscale by pod count -
# read the connection-pool section of SCALABILITY.md (and 25-pgbouncer.yaml).
#
# ── A note on the in-process BullMQ workers ───────────────────────────────────
# job-service, resume-service, screening-service and assessment-service each run
# their HTTP surface AND their queue worker in ONE process (see apps/*/src/index.ts).
# BullMQ is a Redis-backed competing-consumer queue, so adding replicas linearly adds
# worker concurrency AND HTTP capacity together - which is why scaling those
# Deployments on queue depth (via KEDA) also scales their shared HTTP surface. That
# is exactly why they are KEDA-owned, not CPU-HPA-owned, in this tree.
---
# ── frontend ──────────────────────────────────────────────────────────────────
# Next.js SSR + the server-side /api proxy. Baseline 2 (matches the Deployment
# replicas), burst to 8 for a public-apply campaign that drives raw page loads.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: frontend
  namespace: cdc-ats
  labels:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/part-of: cdc-ats
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: frontend
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          # 65% of the 200m request → scale out before SSR latency climbs.
          averageUtilization: 65
  behavior:
    scaleUp:
      # React fast to a traffic spike: allow doubling every 30s.
      stabilizationWindowSeconds: 30
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
    scaleDown:
      # Scale in slowly so a brief lull does not thrash replicas.
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
---
# ── api-gateway ────────────────────────────────────────────────────────────────
# The single public entrypoint; every /api/* request transits it. It is I/O-bound
# (mostly proxying), so a moderate CPU target with a high ceiling absorbs a spike.
# IMPORTANT: the per-IP rate limiters in apps/api-gateway/src/app.ts count
# PER-PROCESS unless the optional `rate-limit-redis` store is enabled (see
# docs/SCALABILITY.md "Rate limiting across replicas"): with N gateway replicas and
# the in-memory store the effective ceiling is silently N× the configured max.
# Declare rate-limit-redis + set REDIS_URL (already in the ConfigMap) to make the
# ceilings cluster-correct, and set TRUST_PROXY so req.ip is the real client IP.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-gateway
  namespace: cdc-ats
  labels:
    app.kubernetes.io/name: api-gateway
    app.kubernetes.io/part-of: cdc-ats
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api-gateway
  minReplicas: 2
  maxReplicas: 12
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          # 60% of the 200m request. The gateway is the throughput chokepoint, so
          # scale it out earlier than the backends it fronts.
          averageUtilization: 60
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
        - type: Pods
          value: 4
          periodSeconds: 30
      # Take whichever policy adds MORE pods, so a sharp spike ramps fast.
      selectPolicy: Max
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
---
# ── identity-service ───────────────────────────────────────────────────────────
# Login + JWT verify + user lookups. Every authenticated request in the system
# ultimately depends on identity being healthy; under a campaign the public apply
# path does not hit it, but the recruiter/admin surface and token refresh do. Pure
# HTTP (no queue), so CPU is the right signal. Moderate range.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: identity-service
  namespace: cdc-ats
  labels:
    app.kubernetes.io/name: identity-service
    app.kubernetes.io/part-of: cdc-ats
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: identity-service
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          # 70% of the 100m request. argon2 verify on login is the CPU cost.
          averageUtilization: 70
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
---
# ── tenant-service ─────────────────────────────────────────────────────────────
# Tenant / plan / branding resolution on the request path (the gateway + services
# resolve tenant context here). Read-hot, pure HTTP. Moderate range.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: tenant-service
  namespace: cdc-ats
  labels:
    app.kubernetes.io/name: tenant-service
    app.kubernetes.io/part-of: cdc-ats
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: tenant-service
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
---
# ── billing-service ────────────────────────────────────────────────────────────
# The plan-gate / entitlement check the gateway calls in front of EVERY AI agent
# route + gated write (requireAgentPlan → /internal/billing/check-agent). A campaign
# that fans out screening drives a check per screen, so this sits on a genuine hot
# path. Pure HTTP. Moderate range.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: billing-service
  namespace: cdc-ats
  labels:
    app.kubernetes.io/name: billing-service
    app.kubernetes.io/part-of: cdc-ats
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: billing-service
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
---
# ── candidate-service ──────────────────────────────────────────────────────────
# Candidate + application reads/writes. The apply spike lands Candidate/Application
# rows via job-service's async ingest, and the recruiter pipeline reads are served
# here, so it is read-and-write-hot under a campaign. Pure HTTP. Wider range than the
# other control-plane services because candidate browse/detail is a heavy read path.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: candidate-service
  namespace: cdc-ats
  labels:
    app.kubernetes.io/name: candidate-service
    app.kubernetes.io/part-of: cdc-ats
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: candidate-service
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 65
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
        - type: Pods
          value: 2
          periodSeconds: 30
      selectPolicy: Max
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
---
# ── interview-service ──────────────────────────────────────────────────────────
# Scheduling + interview-room reads on the recruiter path. Lower volume than the
# apply path, but part of the day-to-day recruiter hot path. Pure HTTP. Modest range.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: interview-service
  namespace: cdc-ats
  labels:
    app.kubernetes.io/name: interview-service
    app.kubernetes.io/part-of: cdc-ats
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: interview-service
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
