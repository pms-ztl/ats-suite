# notification-service — Deployment + Service (docker-compose.demo.yml:375-385).
# Image: infra/Dockerfile.service --build-arg SERVICE=notification-service. Port 4009.
# Owns notifications / in-app chat / HITL / integrations / webhooks;
# DATABASE_URL -> notification_db. Faithful extra: ATS_CONFIG_ENC_KEY
# (AES-256-GCM key encrypting TenantIntegration secrets at rest).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: cdc-ats
  labels:
    app.kubernetes.io/name: notification-service
    app.kubernetes.io/part-of: cdc-ats
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: notification-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: notification-service
        app.kubernetes.io/part-of: cdc-ats
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "4009"
        prometheus.io/path: /metrics
    spec:
      containers:
        - name: notification-service
          image: ghcr.io/cdc-ats/notification-service:latest
          ports:
            - name: http
              containerPort: 4009
          envFrom:
            - configMapRef: { name: cdc-ats-common }
          env:
            - name: PORT
              value: "4009"
            - name: SERVICE_NAME
              value: "notification-service"
            - name: DATABASE_URL
              valueFrom: { secretKeyRef: { name: cdc-ats-secrets, key: NOTIFICATION_DATABASE_URL } }
            - name: JWT_SECRET
              valueFrom: { secretKeyRef: { name: cdc-ats-secrets, key: JWT_SECRET } }
            - name: INTERNAL_SERVICE_TOKEN
              valueFrom: { secretKeyRef: { name: cdc-ats-secrets, key: INTERNAL_SERVICE_TOKEN } }
            - name: OPENROUTER_API_KEY
              valueFrom: { secretKeyRef: { name: cdc-ats-secrets, key: OPENROUTER_API_KEY, optional: true } }
            - name: ANTHROPIC_API_KEY
              valueFrom: { secretKeyRef: { name: cdc-ats-secrets, key: ANTHROPIC_API_KEY, optional: true } }
            - name: OPENAI_API_KEY
              valueFrom: { secretKeyRef: { name: cdc-ats-secrets, key: OPENAI_API_KEY, optional: true } }
            - name: ATS_CONFIG_ENC_KEY
              valueFrom: { secretKeyRef: { name: cdc-ats-secrets, key: ATS_CONFIG_ENC_KEY } }
          startupProbe:
            httpGet: { path: /healthz, port: http }
            periodSeconds: 5
            failureThreshold: 30
          livenessProbe:
            httpGet: { path: /livez, port: http }
            initialDelaySeconds: 20
            periodSeconds: 10
          readinessProbe:
            httpGet: { path: /readyz, port: http }
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits:   { cpu: "1",  memory: 1Gi }
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: cdc-ats
  labels:
    app.kubernetes.io/name: notification-service
    app.kubernetes.io/part-of: cdc-ats
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: notification-service
  ports:
    - name: http
      port: 4009
      targetPort: http
