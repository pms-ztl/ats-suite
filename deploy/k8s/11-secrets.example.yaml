# EXAMPLE Secret — copy to 11-secrets.yaml (gitignored in your deploy) and
# REPLACE every value before applying to a real cluster.
#
# The stringData values below are the SAME placeholder defaults the demo compose
# uses (docker-compose.demo.yml x-svc-env + the ${VAR:-default} fallbacks). They
# are intentionally weak demo values — NOT production secrets. Replace them.
#
# DB URLs point at the in-cluster `postgres` StatefulSet Service (postgres:5432),
# one database per service, matching infra/postgres-init.sql. If you use managed
# Postgres (RDS / Cloud SQL / Neon), point these at it instead.
apiVersion: v1
kind: Secret
metadata:
  name: cdc-ats-secrets
  namespace: cdc-ats
  labels:
    app.kubernetes.io/part-of: cdc-ats
type: Opaque
stringData:
  # ── Shared auth / crypto (demo defaults — REPLACE) ──────────────────────────
  JWT_SECRET: "demo-jwt-secret-min-32-chars-change-me-0123456789"
  INTERNAL_SERVICE_TOKEN: "demo-internal-service-token"
  # api-gateway EMBED_SECRET + notification/assessment ATS_CONFIG_ENC_KEY are
  # required by those containers (compose interpolates them from .env, no default).
  # Generate real values: `openssl rand -base64 48` and `openssl rand -hex 32`.
  EMBED_SECRET: "REPLACE-with-openssl-rand-base64-48"
  ATS_CONFIG_ENC_KEY: "REPLACE-with-openssl-rand-hex-32"
  # ── LLM provider keys (optional; empty in demo) ─────────────────────────────
  OPENROUTER_API_KEY: ""
  ANTHROPIC_API_KEY: ""
  OPENAI_API_KEY: ""
  # ── MinIO / S3 credentials (demo defaults — REPLACE) ────────────────────────
  S3_ACCESS_KEY_ID: "minioadmin"
  S3_SECRET_ACCESS_KEY: "minioadmin"
  # ── Per-service DATABASE_URLs (one DB per service; postgres:5432 in-cluster) ─
  IDENTITY_DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/identity_db"
  TENANT_DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/tenant_db"
  BILLING_DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/billing_db"
  JOB_DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/job_db"
  CANDIDATE_DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/candidate_db"
  INTERVIEW_DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/interview_db"
  RESUME_DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/resume_db"
  SCREENING_DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/screening_db"
  NOTIFICATION_DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/notification_db"
  SEARCH_DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/search_db"
  AGENT_DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/agent_db"
  ANALYTICS_DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/analytics_db"
  COMPLIANCE_DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/compliance_db"
  ASSESSMENT_DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/assessment_db"
  # ── Postgres superuser (consumed by the postgres StatefulSet) ───────────────
  POSTGRES_PASSWORD: "postgres"
