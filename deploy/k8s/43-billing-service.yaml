# billing-service — Deployment + Service (docker-compose.demo.yml:252-258).
# Image: infra/Dockerfile.service --build-arg SERVICE=billing-service. Port 4003.
# Owns plans / AI plan-gating / kill switches / invoices; DATABASE_URL -> billing_db.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: billing-service
  namespace: cdc-ats
  labels:
    app.kubernetes.io/name: billing-service
    app.kubernetes.io/part-of: cdc-ats
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: billing-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: billing-service
        app.kubernetes.io/part-of: cdc-ats
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "4003"
        prometheus.io/path: /metrics
    spec:
      containers:
        - name: billing-service
          image: ghcr.io/cdc-ats/billing-service:latest
          ports:
            - name: http
              containerPort: 4003
          envFrom:
            - configMapRef: { name: cdc-ats-common }
          env:
            - name: PORT
              value: "4003"
            - name: SERVICE_NAME
              value: "billing-service"
            - name: DATABASE_URL
              valueFrom: { secretKeyRef: { name: cdc-ats-secrets, key: BILLING_DATABASE_URL } }
            - name: JWT_SECRET
              valueFrom: { secretKeyRef: { name: cdc-ats-secrets, key: JWT_SECRET } }
            - name: INTERNAL_SERVICE_TOKEN
              valueFrom: { secretKeyRef: { name: cdc-ats-secrets, key: INTERNAL_SERVICE_TOKEN } }
            - name: OPENROUTER_API_KEY
              valueFrom: { secretKeyRef: { name: cdc-ats-secrets, key: OPENROUTER_API_KEY, optional: true } }
            - name: ANTHROPIC_API_KEY
              valueFrom: { secretKeyRef: { name: cdc-ats-secrets, key: ANTHROPIC_API_KEY, optional: true } }
            - name: OPENAI_API_KEY
              valueFrom: { secretKeyRef: { name: cdc-ats-secrets, key: OPENAI_API_KEY, optional: true } }
          startupProbe:
            httpGet: { path: /healthz, port: http }
            periodSeconds: 5
            failureThreshold: 30
          livenessProbe:
            httpGet: { path: /livez, port: http }
            initialDelaySeconds: 20
            periodSeconds: 10
          readinessProbe:
            httpGet: { path: /readyz, port: http }
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits:   { cpu: "1",  memory: 1Gi }
---
apiVersion: v1
kind: Service
metadata:
  name: billing-service
  namespace: cdc-ats
  labels:
    app.kubernetes.io/name: billing-service
    app.kubernetes.io/part-of: cdc-ats
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: billing-service
  ports:
    - name: http
      port: 4003
      targetPort: http
