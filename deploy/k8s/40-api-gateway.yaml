# api-gateway — Deployment + Service (mirrors docker-compose.demo.yml:225-234).
# Image built by infra/Dockerfile.service --build-arg SERVICE=api-gateway.
# Public entrypoint: the browser hits /api/* here; it proxies to every internal
# service. Probes use the common /healthz /livez /readyz that every service
# mounts (packages/common/src/lib/health.ts). EMBED_SECRET is gateway-only.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: cdc-ats
  labels:
    app.kubernetes.io/name: api-gateway
    app.kubernetes.io/part-of: cdc-ats
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: api-gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: api-gateway
        app.kubernetes.io/part-of: cdc-ats
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "4000"
        prometheus.io/path: /metrics
    spec:
      containers:
        - name: api-gateway
          # Retag your CI-built image here. Built by:
          #   docker build -f infra/Dockerfile.service --build-arg SERVICE=api-gateway \
          #     -t ghcr.io/cdc-ats/api-gateway:latest .
          image: ghcr.io/cdc-ats/api-gateway:latest
          ports:
            - name: http
              containerPort: 4000
          envFrom:
            - configMapRef: { name: cdc-ats-common }
          env:
            - name: PORT
              value: "4000"
            - name: SERVICE_NAME
              value: "api-gateway"
            # WF-I / I5: trust the ingress/LB in front of the gateway so Express
            # derives req.ip from X-Forwarded-For (the real client IP) instead of
            # the single upstream socket. WITHOUT this the per-IP rate limiters in
            # apps/api-gateway/src/app.ts collapse every client into ONE bucket and
            # 429 the whole apply spike. "true" trusts all hops (correct behind a
            # single k8s Ingress/LB); set to the hop count "N" for an LB chain, or a
            # CSV of trusted proxy CIDRs for direct-exposure. See docs/SCALABILITY.md.
            - name: TRUST_PROXY
              value: "true"
            # WF-I / I5: with >1 gateway replica (this Deployment runs 2 + an HPA),
            # the express-rate-limit ceilings must be COUNTED ACROSS replicas or the
            # effective limit is silently N×. REDIS_URL comes from the ConfigMap; the
            # gateway uses a shared Redis limiter store ONLY when `rate-limit-redis`
            # is present in apps/api-gateway/package.json (best-effort optional import;
            # see the I5 code comment). Until that dep is declared the limiter falls
            # back to the per-process in-memory store. DISABLE_RATE_LIMIT=1 turns the
            # limiters off entirely (not recommended in production).
            - name: JWT_SECRET
              valueFrom: { secretKeyRef: { name: cdc-ats-secrets, key: JWT_SECRET } }
            - name: INTERNAL_SERVICE_TOKEN
              valueFrom: { secretKeyRef: { name: cdc-ats-secrets, key: INTERNAL_SERVICE_TOKEN } }
            - name: OPENROUTER_API_KEY
              valueFrom: { secretKeyRef: { name: cdc-ats-secrets, key: OPENROUTER_API_KEY, optional: true } }
            - name: ANTHROPIC_API_KEY
              valueFrom: { secretKeyRef: { name: cdc-ats-secrets, key: ANTHROPIC_API_KEY, optional: true } }
            - name: OPENAI_API_KEY
              valueFrom: { secretKeyRef: { name: cdc-ats-secrets, key: OPENAI_API_KEY, optional: true } }
            # Gateway-only: EMBED_SECRET (compose api-gateway env, line 233).
            - name: EMBED_SECRET
              valueFrom: { secretKeyRef: { name: cdc-ats-secrets, key: EMBED_SECRET } }
          startupProbe:
            httpGet: { path: /healthz, port: http }
            periodSeconds: 5
            failureThreshold: 30
          livenessProbe:
            httpGet: { path: /livez, port: http }
            initialDelaySeconds: 20
            periodSeconds: 10
          readinessProbe:
            httpGet: { path: /readyz, port: http }
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests: { cpu: 200m, memory: 384Mi }
            limits:   { cpu: "1",  memory: 1Gi }
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: cdc-ats
  labels:
    app.kubernetes.io/name: api-gateway
    app.kubernetes.io/part-of: cdc-ats
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: api-gateway
  ports:
    - name: http
      port: 4000
      targetPort: http
