# Self-contained Prometheus (path A) - a single Deployment + Service that scrapes
# the ATS pods via the annotation-based config in 10-prometheus-config.yaml and
# evaluates the rules in 30-alert-rules.yaml.
#
# HONEST STATUS: single-replica, emptyDir storage - this is a MONITORING starter,
# not an HA/long-retention setup. For production use the Prometheus Operator
# (path B) or give this a PVC + longer --storage.tsdb.retention.time, and add
# Alertmanager for routing/paging. Not tested against a live cluster.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: cdc-ats-monitoring
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: cdc-ats
    app.kubernetes.io/component: observability
spec:
  replicas: 1
  # Recreate: a single Prometheus with emptyDir must not run two copies.
  strategy: { type: Recreate }
  selector:
    matchLabels:
      app.kubernetes.io/name: prometheus
  template:
    metadata:
      labels:
        app.kubernetes.io/name: prometheus
        app.kubernetes.io/part-of: cdc-ats
        app.kubernetes.io/component: observability
    spec:
      serviceAccountName: prometheus
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534   # nobody - the prom/prometheus image runs as this UID
        fsGroup: 65534
      containers:
        - name: prometheus
          image: prom/prometheus:v2.54.1
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
            - --storage.tsdb.retention.time=15d
            - --web.enable-lifecycle   # allows POST /-/reload after a config edit
          ports:
            - name: web
              containerPort: 9090
          volumeMounts:
            - { name: config, mountPath: /etc/prometheus }
            - { name: rules,  mountPath: /etc/prometheus/rules }
            - { name: data,   mountPath: /prometheus }
          readinessProbe:
            httpGet: { path: /-/ready, port: web }
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /-/healthy, port: web }
            initialDelaySeconds: 20
            periodSeconds: 15
          resources:
            requests: { cpu: 200m, memory: 512Mi }
            limits:   { cpu: "1",  memory: 2Gi }
      volumes:
        - name: config
          configMap: { name: prometheus-config }
        - name: rules
          configMap: { name: prometheus-alert-rules }
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: cdc-ats-monitoring
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: cdc-ats
    app.kubernetes.io/component: observability
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: prometheus
  ports:
    - name: web
      port: 9090
      targetPort: web
