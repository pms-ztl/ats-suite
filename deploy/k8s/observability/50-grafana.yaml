# ═══════════════════════════════════════════════════════════════════════════════
#  Grafana (self-contained) - Deployment + Service + provisioning.
#
#  HONEST STATUS: single-replica, emptyDir, admin password from a Secret you must
#  create (see below). This is a starter dashboards install, not HA. The dashboard
#  JSON lives in dashboards/cdc-ats-overview.json; it is mounted into Grafana via a
#  ConfigMap generated by the observability kustomization (configMapGenerator), so
#  edit the JSON file, not an inline copy.
#
#  Datasource points at the self-contained Prometheus Service
#  (prometheus.cdc-ats-monitoring.svc:9090, path A). If you run the Prometheus
#  Operator (path B) instead, change the datasource URL to your Operator's
#  Prometheus Service.
#
#  Admin credentials: create the Secret before applying, e.g.
#    kubectl -n cdc-ats-monitoring create secret generic grafana-admin \
#      --from-literal=admin-user=admin \
#      --from-literal=admin-password='<choose-a-strong-password>'
#  NEVER commit a real password. The Deployment reads it via secretKeyRef.
# ═══════════════════════════════════════════════════════════════════════════════
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-provisioning
  namespace: cdc-ats-monitoring
  labels:
    app.kubernetes.io/part-of: cdc-ats
    app.kubernetes.io/component: observability
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        # path A target. Change to your Operator's Prometheus Service for path B.
        url: http://prometheus.cdc-ats-monitoring.svc:9090
        isDefault: true
        editable: false
  dashboard-provider.yaml: |
    apiVersion: 1
    providers:
      - name: cdc-ats
        orgId: 1
        folder: CDC ATS
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: cdc-ats-monitoring
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: cdc-ats
    app.kubernetes.io/component: observability
spec:
  replicas: 1
  strategy: { type: Recreate }
  selector:
    matchLabels:
      app.kubernetes.io/name: grafana
  template:
    metadata:
      labels:
        app.kubernetes.io/name: grafana
        app.kubernetes.io/part-of: cdc-ats
        app.kubernetes.io/component: observability
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 472    # grafana image UID
        fsGroup: 472
      containers:
        - name: grafana
          image: grafana/grafana:11.2.0
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_USER
              valueFrom: { secretKeyRef: { name: grafana-admin, key: admin-user } }
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom: { secretKeyRef: { name: grafana-admin, key: admin-password } }
            # Anonymous access off; sign-up off. This is an ops console.
            - name: GF_USERS_ALLOW_SIGN_UP
              value: "false"
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "false"
          volumeMounts:
            - { name: provisioning-datasources, mountPath: /etc/grafana/provisioning/datasources }
            - { name: provisioning-dashboards,  mountPath: /etc/grafana/provisioning/dashboards }
            - { name: dashboards,               mountPath: /var/lib/grafana/dashboards }
            - { name: storage,                  mountPath: /var/lib/grafana }
          readinessProbe:
            httpGet: { path: /api/health, port: http }
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /api/health, port: http }
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits:   { cpu: 500m, memory: 512Mi }
      volumes:
        - name: provisioning-datasources
          configMap:
            name: grafana-provisioning
            items:
              - { key: datasources.yaml, path: datasources.yaml }
        - name: provisioning-dashboards
          configMap:
            name: grafana-provisioning
            items:
              - { key: dashboard-provider.yaml, path: cdc-ats.yaml }
        # Dashboard JSON - generated from dashboards/*.json by the kustomization
        # configMapGenerator (name: grafana-dashboards). Each JSON becomes a key.
        - name: dashboards
          configMap: { name: grafana-dashboards }
        - name: storage
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: cdc-ats-monitoring
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: cdc-ats
    app.kubernetes.io/component: observability
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: grafana
  ports:
    - name: http
      port: 3000
      targetPort: http
