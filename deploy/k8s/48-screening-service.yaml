# screening-service — Deployment + Service (docker-compose.demo.yml:363-373).
# Image: infra/Dockerfile.service --build-arg SERVICE=screening-service. Port 4008.
# Runs the AI candidate-screener; DATABASE_URL -> screening_db.
# Faithful extras: SCREENING_CONCURRENCY=6 / SCREENING_RATE_MAX=30 (bulk-screen
# BullMQ throughput; plan-gating + cost caps unchanged).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: screening-service
  namespace: cdc-ats
  labels:
    app.kubernetes.io/name: screening-service
    app.kubernetes.io/part-of: cdc-ats
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: screening-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: screening-service
        app.kubernetes.io/part-of: cdc-ats
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "4008"
        prometheus.io/path: /metrics
    spec:
      containers:
        - name: screening-service
          image: ghcr.io/cdc-ats/screening-service:latest
          ports:
            - name: http
              containerPort: 4008
          envFrom:
            - configMapRef: { name: cdc-ats-common }
          env:
            - name: PORT
              value: "4008"
            - name: SERVICE_NAME
              value: "screening-service"
            - name: DATABASE_URL
              valueFrom: { secretKeyRef: { name: cdc-ats-secrets, key: SCREENING_DATABASE_URL } }
            - name: JWT_SECRET
              valueFrom: { secretKeyRef: { name: cdc-ats-secrets, key: JWT_SECRET } }
            - name: INTERNAL_SERVICE_TOKEN
              valueFrom: { secretKeyRef: { name: cdc-ats-secrets, key: INTERNAL_SERVICE_TOKEN } }
            - name: OPENROUTER_API_KEY
              valueFrom: { secretKeyRef: { name: cdc-ats-secrets, key: OPENROUTER_API_KEY, optional: true } }
            - name: ANTHROPIC_API_KEY
              valueFrom: { secretKeyRef: { name: cdc-ats-secrets, key: ANTHROPIC_API_KEY, optional: true } }
            - name: OPENAI_API_KEY
              valueFrom: { secretKeyRef: { name: cdc-ats-secrets, key: OPENAI_API_KEY, optional: true } }
            - name: SCREENING_CONCURRENCY
              value: "6"
            - name: SCREENING_RATE_MAX
              value: "30"
          startupProbe:
            httpGet: { path: /healthz, port: http }
            periodSeconds: 5
            failureThreshold: 30
          livenessProbe:
            httpGet: { path: /livez, port: http }
            initialDelaySeconds: 20
            periodSeconds: 10
          readinessProbe:
            httpGet: { path: /readyz, port: http }
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits:   { cpu: "1",  memory: 1Gi }
---
apiVersion: v1
kind: Service
metadata:
  name: screening-service
  namespace: cdc-ats
  labels:
    app.kubernetes.io/name: screening-service
    app.kubernetes.io/part-of: cdc-ats
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: screening-service
  ports:
    - name: http
      port: 4008
      targetPort: http
