# notification-service runs 1 replica at baseline but its KEDA ScaledObject
# (60-keda-scaledobjects.yaml) has minReplicaCount 1; a minAvailable: 1 PDB would
# make a single-replica period undrainable, so use maxUnavailable: 1 instead - it
# permits a drain to evict the pod (allowed disruptions = 1) while still capping
# concurrent voluntary loss once KEDA has scaled it out.
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: notification-service
  namespace: cdc-ats
  labels:
    app.kubernetes.io/name: notification-service
    app.kubernetes.io/part-of: cdc-ats
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: notification-service
---
# assessment-service KEDA minReplicaCount is 1 (spiky, low steady-state), so the
# same single-replica-drainable reasoning as notification-service applies.
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: assessment-service
  namespace: cdc-ats
  labels:
    app.kubernetes.io/name: assessment-service
    app.kubernetes.io/part-of: cdc-ats
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: assessment-service
---
# search / agent / analytics / compliance run 1 replica at baseline and have no HPA;
# use maxUnavailable: 1 so a node drain can always proceed (a minAvailable PDB would
# wedge a single-replica pod). Bump to minAvailable once you raise their replicas.
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: search-service
  namespace: cdc-ats
  labels:
    app.kubernetes.io/name: search-service
    app.kubernetes.io/part-of: cdc-ats
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: search-service
