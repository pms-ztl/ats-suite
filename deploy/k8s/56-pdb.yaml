# pgbouncer runs 2 replicas (25-pgbouncer.yaml) - keep 1 pooler available through a
# drain so app DB traffic is never fully cut.
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: pgbouncer
  namespace: cdc-ats
  labels:
    app.kubernetes.io/name: pgbouncer
    app.kubernetes.io/part-of: cdc-ats
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: pgbouncer
