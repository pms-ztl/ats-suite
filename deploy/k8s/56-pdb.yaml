# PodDisruptionBudgets - keep a minimum number of replicas serving during
# VOLUNTARY disruptions (node drain for an upgrade, cluster autoscaler compaction,
# `kubectl drain`). A PDB does NOT protect against involuntary disruption (a node
# crash); it caps how many pods the scheduler/drain may take down at once.
#
# ── Honest status ─────────────────────────────────────────────────────────────
# Additive, derived from the Deployments in this tree. NOT applied to or tested
# against a live cluster (README.md "Honest status"). The min-available numbers are
# chosen against each Deployment's baseline replica count (2 for the HPA-managed and
# multi-replica services) so a drain always leaves at least one pod serving.
#
# ── Why these selectors ───────────────────────────────────────────────────────
# Each PDB selects the SAME app.kubernetes.io/name label the Deployment's pods carry.
# The app services run >=2 replicas (their Deployment baseline and/or their HPA/KEDA
# minReplicas), so `minAvailable: 1` lets a drain evict one at a time while keeping
# the service up. For the two public-facing, highest-baseline deployables
# (api-gateway, frontend - Deployment replicas: 2) we still use minAvailable: 1 so a
# drain can proceed one pod at a time (a node cannot host both if you spread them).
#
# ── Why the single-replica StatefulSets are NOT here ──────────────────────────
# postgres, redis, nats, minio (and the demo runs each as ONE replica) are
# intentionally OMITTED: a PDB with minAvailable: 1 on a single-replica workload makes
# the pod UNDRAINABLE (the drain can never satisfy "keep 1 available" while evicting
# the only pod), which blocks node maintenance instead of protecting availability.
# The right protection for those is to run them HA (a Postgres operator with a standby,
# a Redis Sentinel/cluster, a multi-node NATS, a distributed MinIO) and add PDBs THEN.
# Until they are HA, a PDB would do more harm than good - see 20/21/22/23-*.yaml and
# the SCALABILITY.md note that these are shared infra to size/HA separately.
# pgbouncer (25-pgbouncer.yaml) runs 2 replicas and DOES get a PDB below.
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: api-gateway
  namespace: cdc-ats
  labels:
    app.kubernetes.io/name: api-gateway
    app.kubernetes.io/part-of: cdc-ats
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: api-gateway
---
