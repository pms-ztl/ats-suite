# CDC ATS — full stack (infra + 10 backend services + frontend)
#
# Usage:
#   npm run docker:build:all   # build every image (one-time, ~10 min cold)
#   npm run docker:up:all      # start everything
#   npm run docker:down:all    # stop + remove containers
#
# All services share the `ats_net` bridge network and resolve each other
# by container name (e.g. http://identity-service:4001).
name: cdc-ats-full

x-service-defaults: &service-defaults
  restart: unless-stopped
  networks:
    - ats_net
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
    nats:
      condition: service_started

x-service-env: &service-env
  NODE_ENV: production
  # Inside the compose network, services resolve infra by container name
  REDIS_URL: redis://redis:6379
  NATS_URL: nats://nats:4222
  JWT_SECRET: ${JWT_SECRET:-change-me-in-production-this-is-a-256-bit-secret-key-for-jwt}
  INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-local-dev-internal-service-token}
  CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
  JAEGER_ENDPOINT: http://jaeger:4318/v1/traces
  OTEL_DISABLED: "true"
  # Cross-service URLs (used by gateway proxy + service-clients)
  IDENTITY_SERVICE_URL: http://identity-service:4001
  TENANT_SERVICE_URL: http://tenant-service:4002
  BILLING_SERVICE_URL: http://billing-service:4003
  JOB_SERVICE_URL: http://job-service:4004
  CANDIDATE_SERVICE_URL: http://candidate-service:4005
  INTERVIEW_SERVICE_URL: http://interview-service:4006
  RESUME_SERVICE_URL: http://resume-service:4007
  SCREENING_SERVICE_URL: http://screening-service:4008
  NOTIFICATION_SERVICE_URL: http://notification-service:4009
  # Module F — onboarding-service. Module D — collab-service (interview realtime hub).
  ONBOARDING_SERVICE_URL: http://onboarding-service:4015
  COLLAB_SERVICE_URL: http://collab-service:4016
  # interview-service mints collab tokens; collab-service verifies them with the
  # SAME secret. The browser connects to the collab WS at this public URL.
  COLLAB_TOKEN_SECRET: ${COLLAB_TOKEN_SECRET:-local-dev-collab-secret}
  COLLAB_WS_PUBLIC_URL: ${COLLAB_WS_PUBLIC_URL:-ws://localhost:4016/rt}

networks:
  ats_net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  nats_data:
  prometheus_data:
  grafana_data:
  loki_data:

services:
  # ═════════════════════════════════════════════════════════════════════════
  # INFRASTRUCTURE
  # ═════════════════════════════════════════════════════════════════════════
  postgres:
    image: postgres:16-alpine
    container_name: ats-postgres
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: postgres
    ports: ["5434:5432"]
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init.sql:/docker-entrypoint-initdb.d/00-create-dbs.sql:ro
    networks: [ats_net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: ats-redis
    restart: unless-stopped
    ports: ["6381:6379"]
    volumes: [redis_data:/data]
    command: redis-server --appendonly yes
    networks: [ats_net]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  nats:
    image: nats:2.10-alpine
    container_name: ats-nats
    restart: unless-stopped
    command: ["-js", "-sd", "/data", "-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes: [nats_data:/data]
    networks: [ats_net]
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:8222/healthz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: ats-jaeger
    restart: unless-stopped
    environment: {COLLECTOR_OTLP_ENABLED: "true"}
    ports: ["16686:16686", "14268:14268", "4317:4317", "4318:4318"]
    networks: [ats_net]

  prometheus:
    image: prom/prometheus:v3.0.1
    container_name: ats-prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    ports: ["9090:9090"]
    networks: [ats_net]

  grafana:
    image: grafana/grafana:11.4.0
    container_name: ats-grafana
    restart: unless-stopped
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana-datasources.yml:/etc/grafana/provisioning/datasources/all.yml:ro
    ports: ["3001:3000"]
    networks: [ats_net]

  loki:
    image: grafana/loki:3.3.2
    container_name: ats-loki
    restart: unless-stopped
    ports: ["3100:3100"]
    volumes: [loki_data:/loki]
    command: -config.file=/etc/loki/local-config.yaml
    networks: [ats_net]

  # ═════════════════════════════════════════════════════════════════════════
  # 10 BACKEND SERVICES
  # ═════════════════════════════════════════════════════════════════════════
  api-gateway:
    <<: *service-defaults
    container_name: ats-api-gateway
    build:
      context: ..
      dockerfile: infra/Dockerfile.service
      args: {SERVICE: api-gateway}
    environment:
      <<: *service-env
      PORT: "4000"
    ports: ["4000:4000"]

  identity-service:
    <<: *service-defaults
    container_name: ats-identity-service
    build:
      context: ..
      dockerfile: infra/Dockerfile.service
      args: {SERVICE: identity-service}
    environment:
      <<: *service-env
      PORT: "4001"
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/identity_db
    ports: ["4001:4001"]

  tenant-service:
    <<: *service-defaults
    container_name: ats-tenant-service
    build:
      context: ..
      dockerfile: infra/Dockerfile.service
      args: {SERVICE: tenant-service}
    environment:
      <<: *service-env
      PORT: "4002"
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/tenant_db
    ports: ["4002:4002"]

  billing-service:
    <<: *service-defaults
    container_name: ats-billing-service
    build:
      context: ..
      dockerfile: infra/Dockerfile.service
      args: {SERVICE: billing-service}
    environment:
      <<: *service-env
      PORT: "4003"
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/billing_db
    ports: ["4003:4003"]

  job-service:
    <<: *service-defaults
    container_name: ats-job-service
    build:
      context: ..
      dockerfile: infra/Dockerfile.service
      args: {SERVICE: job-service}
    environment:
      <<: *service-env
      PORT: "4004"
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/job_db
    ports: ["4004:4004"]

  candidate-service:
    <<: *service-defaults
    container_name: ats-candidate-service
    build:
      context: ..
      dockerfile: infra/Dockerfile.service
      args: {SERVICE: candidate-service}
    environment:
      <<: *service-env
      PORT: "4005"
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/candidate_db
    ports: ["4005:4005"]

  interview-service:
    <<: *service-defaults
    container_name: ats-interview-service
    build:
      context: ..
      dockerfile: infra/Dockerfile.service
      args: {SERVICE: interview-service}
    environment:
      <<: *service-env
      PORT: "4006"
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/interview_db
    ports: ["4006:4006"]

  resume-service:
    <<: *service-defaults
    container_name: ats-resume-service
    build:
      context: ..
      dockerfile: infra/Dockerfile.service
      args: {SERVICE: resume-service}
    environment:
      <<: *service-env
      PORT: "4007"
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/resume_db
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    ports: ["4007:4007"]

  screening-service:
    <<: *service-defaults
    container_name: ats-screening-service
    build:
      context: ..
      dockerfile: infra/Dockerfile.service
      args: {SERVICE: screening-service}
    environment:
      <<: *service-env
      PORT: "4008"
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/screening_db
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    ports: ["4008:4008"]

  notification-service:
    <<: *service-defaults
    container_name: ats-notification-service
    build:
      context: ..
      dockerfile: infra/Dockerfile.service
      args: {SERVICE: notification-service}
    environment:
      <<: *service-env
      PORT: "4009"
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/notification_db
    ports: ["4009:4009"]

  # Module F — onboarding-service (Workday-style post-offer onboarding).
  onboarding-service:
    <<: *service-defaults
    container_name: ats-onboarding-service
    build:
      context: ..
      dockerfile: infra/Dockerfile.service
      args: {SERVICE: onboarding-service}
    environment:
      <<: *service-env
      PORT: "4015"
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/onboarding_db
    ports: ["4015:4015"]

  # Module D — collab-service (interview realtime hub: WebRTC signaling + Yjs relay).
  # Stateless, no database; the WS endpoint is /rt.
  collab-service:
    <<: *service-defaults
    container_name: ats-collab-service
    build:
      context: ..
      dockerfile: infra/Dockerfile.service
      args: {SERVICE: collab-service}
    environment:
      <<: *service-env
      PORT: "4016"
    ports: ["4016:4016"]

  # ═════════════════════════════════════════════════════════════════════════
  # FRONTEND
  # ═════════════════════════════════════════════════════════════════════════
  frontend:
    container_name: ats-frontend
    restart: unless-stopped
    build:
      context: ..
      dockerfile: infra/Dockerfile.frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
        NEXT_PUBLIC_COLLAB_WS_URL: ${NEXT_PUBLIC_COLLAB_WS_URL:-ws://localhost:4016/rt}
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
      NEXT_PUBLIC_COLLAB_WS_URL: ${NEXT_PUBLIC_COLLAB_WS_URL:-ws://localhost:4016/rt}
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
    ports: ["3000:3000"]
    depends_on:
      - api-gateway
    networks: [ats_net]
