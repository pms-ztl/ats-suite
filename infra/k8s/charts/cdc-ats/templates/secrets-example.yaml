# Example Secret manifest — DO NOT COMMIT REAL VALUES.
#
# Create this Secret manually before deploying:
#
#   kubectl create secret generic cdc-ats-secrets -n cdc-ats \
#     --from-literal=JWT_SECRET="$(openssl rand -base64 48)" \
#     --from-literal=INTERNAL_SERVICE_TOKEN="$(openssl rand -base64 32)" \
#     --from-literal=ANTHROPIC_API_KEY="sk-ant-..." \
#     --from-literal=IDENTITY_DATABASE_URL="postgresql://..." \
#     --from-literal=TENANT_DATABASE_URL="postgresql://..." \
#     --from-literal=BILLING_DATABASE_URL="postgresql://..." \
#     --from-literal=JOB_DATABASE_URL="postgresql://..." \
#     --from-literal=CANDIDATE_DATABASE_URL="postgresql://..." \
#     --from-literal=INTERVIEW_DATABASE_URL="postgresql://..." \
#     --from-literal=RESUME_DATABASE_URL="postgresql://..." \
#     --from-literal=SCREENING_DATABASE_URL="postgresql://..." \
#     --from-literal=NOTIFICATION_DATABASE_URL="postgresql://..."
#
# Or use SealedSecrets / External Secrets Operator for GitOps:
#   https://github.com/bitnami-labs/sealed-secrets
#   https://external-secrets.io/
#
# This file is intentionally a comment-only manifest so `helm template` /
# `helm install` doesn't fail when the secret doesn't exist (it's
# referenced by deployments via secretKeyRef which fails-soft on
# missing keys via `optional: true` where appropriate).
