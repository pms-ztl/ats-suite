# Production overrides — managed Postgres + Redis, no in-cluster infra,
# stricter resource limits.
#
# Deploy:
#   helm upgrade --install cdc-ats ./infra/k8s/charts/cdc-ats \
#     -f infra/k8s/charts/cdc-ats/values.yaml \
#     -f infra/k8s/charts/cdc-ats/values-production.yaml \
#     --namespace cdc-ats --create-namespace

# Infra (Postgres / Redis / NATS) installed separately — see README.

services:
  api-gateway:
    replicaCount: 3
    autoscaling: { enabled: true, minReplicas: 3, maxReplicas: 12, targetCPUUtilizationPercentage: 60 }
    resources:
      requests: { cpu: 500m, memory: 512Mi }
      limits:   { cpu: 2000m, memory: 2Gi }

  frontend:
    replicaCount: 3
    autoscaling: { enabled: true, minReplicas: 3, maxReplicas: 8, targetCPUUtilizationPercentage: 70 }
    resources:
      requests: { cpu: 200m, memory: 384Mi }
      limits:   { cpu: 1000m, memory: 1Gi }

  identity-service:    { replicaCount: 2, autoscaling: { enabled: true, minReplicas: 2, maxReplicas: 6, targetCPUUtilizationPercentage: 70 } }
  tenant-service:      { replicaCount: 2, autoscaling: { enabled: true, minReplicas: 2, maxReplicas: 4, targetCPUUtilizationPercentage: 70 } }
  billing-service:     { replicaCount: 2, autoscaling: { enabled: true, minReplicas: 2, maxReplicas: 4, targetCPUUtilizationPercentage: 70 } }
  job-service:         { replicaCount: 2, autoscaling: { enabled: true, minReplicas: 2, maxReplicas: 6, targetCPUUtilizationPercentage: 70 } }
  candidate-service:   { replicaCount: 2, autoscaling: { enabled: true, minReplicas: 2, maxReplicas: 8, targetCPUUtilizationPercentage: 70 } }
  interview-service:   { replicaCount: 2, autoscaling: { enabled: true, minReplicas: 2, maxReplicas: 6, targetCPUUtilizationPercentage: 70 } }
  resume-service:      { replicaCount: 2, autoscaling: { enabled: true, minReplicas: 2, maxReplicas: 8, targetCPUUtilizationPercentage: 70 } }
  screening-service:   { replicaCount: 2, autoscaling: { enabled: true, minReplicas: 2, maxReplicas: 8, targetCPUUtilizationPercentage: 70 } }
  notification-service:
    replicaCount: 3   # SSE fan-out benefits from more replicas
    autoscaling: { enabled: true, minReplicas: 3, maxReplicas: 6, targetCPUUtilizationPercentage: 70 }
