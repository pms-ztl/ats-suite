global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'api-gateway'
    static_configs:
      - targets: ['host.docker.internal:4000']
    metrics_path: /metrics

  - job_name: 'identity-service'
    static_configs:
      - targets: ['host.docker.internal:4001']
    metrics_path: /metrics

  - job_name: 'tenant-service'
    static_configs:
      - targets: ['host.docker.internal:4002']
    metrics_path: /metrics

  - job_name: 'billing-service'
    static_configs:
      - targets: ['host.docker.internal:4003']
    metrics_path: /metrics

  - job_name: 'job-service'
    static_configs:
      - targets: ['host.docker.internal:4004']
    metrics_path: /metrics

  - job_name: 'candidate-service'
    static_configs:
      - targets: ['host.docker.internal:4005']
    metrics_path: /metrics

  - job_name: 'interview-service'
    static_configs:
      - targets: ['host.docker.internal:4006']
    metrics_path: /metrics

  - job_name: 'resume-service'
    static_configs:
      - targets: ['host.docker.internal:4007']
    metrics_path: /metrics

  - job_name: 'screening-service'
    static_configs:
      - targets: ['host.docker.internal:4008']
    metrics_path: /metrics

  - job_name: 'notification-service'
    static_configs:
      - targets: ['host.docker.internal:4009']
    metrics_path: /metrics
