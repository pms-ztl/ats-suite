# Phase 25 — production nginx reverse proxy.
#
# Sits in front of the Docker Compose stack so the user only exposes :80 and
# :443 to the internet. Two virtual hosts:
#
#   app.example.com  → frontend (Next.js standalone)
#   api.example.com  → api-gateway (which fans out to backend services)
#
# TLS: bring your own cert (mount /etc/nginx/certs as a volume) or terminate
# TLS at your cloud LB and run nginx as plaintext upstream.
#
# Replace `example.com` with your real domain. Replace upstream hosts if
# you're not using Docker Compose service-DNS.

worker_processes auto;
worker_rlimit_nofile 65535;

events {
  worker_connections 8192;
  multi_accept on;
}

http {
  # ─── Basics ───────────────────────────────────────────────────────────────
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  types_hash_max_size 2048;
  server_tokens off;

  # ─── Logging ──────────────────────────────────────────────────────────────
  log_format main '$remote_addr - $remote_user [$time_local] '
                  '"$request" $status $body_bytes_sent '
                  '"$http_referer" "$http_user_agent" '
                  'rt=$request_time uct=$upstream_connect_time urt=$upstream_response_time';
  access_log /var/log/nginx/access.log main;
  error_log  /var/log/nginx/error.log warn;

  # ─── Compression ──────────────────────────────────────────────────────────
  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_types text/plain text/css text/javascript application/javascript
             application/json application/xml application/xml+rss image/svg+xml;

  # ─── Security headers (apply to all server blocks) ────────────────────────
  # Override per-server if a header needs a different value.
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

  # ─── Upstream pools ───────────────────────────────────────────────────────
  # `keepalive` keeps connections to backends warm; cuts handshake overhead
  # on hot paths.
  upstream frontend_upstream {
    server frontend:3000;
    keepalive 32;
  }
  upstream api_upstream {
    server api-gateway:4000;
    keepalive 32;
  }

  # ─── Rate limit zones ─────────────────────────────────────────────────────
  # Cheap defense-in-depth; the gateway has its own per-tenant rate limit.
  # 600 r/min per IP for /api/*, 100 r/min per IP for /auth/* (brute-force).
  limit_req_zone $binary_remote_addr zone=api_rl:10m rate=10r/s;
  limit_req_zone $binary_remote_addr zone=auth_rl:10m rate=2r/s;

  # ─── Redirect HTTP → HTTPS ────────────────────────────────────────────────
  # Comment out if your cloud LB already terminates TLS.
  server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # ACME http-01 challenge for cert-manager / certbot.
    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  # ─── app.example.com → frontend ───────────────────────────────────────────
  server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name app.example.com;

    ssl_certificate     /etc/nginx/certs/app/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/app/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:50m;
    ssl_session_timeout 1d;

    client_max_body_size 50M; # Big enough for resume + bulk-upload payloads via Next API routes if any

    location / {
      proxy_pass http://frontend_upstream;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host  $host;
      proxy_read_timeout 60s;
    }
  }

  # ─── api.example.com → api-gateway ────────────────────────────────────────
  server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.example.com;

    ssl_certificate     /etc/nginx/certs/api/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/api/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:50m;
    ssl_session_timeout 1d;

    client_max_body_size 100M; # Bulk-upload endpoint accepts up to 1000 resumes

    # Auth routes: brute-force protection
    location ~ ^/api/auth/ {
      limit_req zone=auth_rl burst=10 nodelay;
      proxy_pass http://api_upstream;
      include   /etc/nginx/proxy_params.conf;
    }

    # SSE streaming endpoint — disable buffering so notifications flow
    # immediately to the client.
    location /api/notifications/stream {
      proxy_pass http://api_upstream;
      proxy_http_version 1.1;
      proxy_buffering off;
      proxy_cache off;
      proxy_set_header Connection "";
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 24h;
    }

    # General API
    location /api/ {
      limit_req zone=api_rl burst=50 nodelay;
      proxy_pass http://api_upstream;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 60s;
    }

    # Health probe (no auth, no rate limit — used by k8s liveness etc.)
    location = /healthz {
      proxy_pass http://api_upstream/healthz;
      access_log off;
    }
  }
}
