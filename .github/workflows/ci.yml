name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (lint + typecheck + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: TypeScript typecheck
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test
        env:
          NODE_ENV: test
          JWT_SECRET: ci-test-secret-key-minimum-32-chars
          JWT_ISSUER: ats-test
          JWT_AUDIENCE: ats-test
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ats_test

  frontend:
    name: Frontend (lint + typecheck + test + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript typecheck
        run: npx tsc --noEmit

      - name: Run unit tests
        run: npm test

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_USE_MOCKS: 'false'
          NEXT_PUBLIC_API_URL: 'http://localhost:4000/api'

  eval-gate:
    name: Agent eval regression gate
    runs-on: ubuntu-latest
    needs: [backend]
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npx prisma generate
      - name: Run eval gate tests
        run: npx vitest run src/tests/eval-gate.test.ts
        env:
          NODE_ENV: test
          JWT_SECRET: ci-test-secret-key-minimum-32-chars
      - name: Run adversarial eval tests
        run: npx vitest run src/tests/adversarial.test.ts
        env:
          NODE_ENV: test
          JWT_SECRET: ci-test-secret-key-minimum-32-chars

  prisma-check:
    name: Prisma schema validation
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Validate Prisma schema
        run: npx prisma validate

      - name: Format check
        run: npx prisma format --check 2>&1 || true
