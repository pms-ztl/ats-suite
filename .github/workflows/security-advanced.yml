name: Security Advanced

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 3 * * 2'  # Weekly Tuesday 3am

jobs:
  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate SBOM (frontend)
        uses: anchore/sbom-action@v0
        with:
          path: ./frontend
          artifact-name: sbom-frontend.spdx.json
          format: spdx-json

      - name: Generate SBOM (backend)
        uses: anchore/sbom-action@v0
        with:
          path: ./backend
          artifact-name: sbom-backend.spdx.json
          format: spdx-json

  secrets-scan:
    name: Secret scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog OSS scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          extra_args: --debug --only-verified

  sast:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    container:
      image: returntocorp/semgrep
    steps:
      - uses: actions/checkout@v4

      - name: Semgrep scan
        run: semgrep ci --config=auto --error
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
        continue-on-error: true

  container-scan:
    name: Container vulnerability scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t ats-backend:scan ./backend

      - name: Trivy scan backend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'ats-backend:scan'
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'
