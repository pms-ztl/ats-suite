version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    mem_limit: 1g
    environment:
      POSTGRES_USER: ats
      POSTGRES_PASSWORD: ats_password
      POSTGRES_DB: ats_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ats']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    mem_limit: 256m
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 3

  langfuse:
    image: langfuse/langfuse:latest
    restart: unless-stopped
    mem_limit: 512m
    ports:
      - '3001:3000'
    environment:
      DATABASE_URL: postgresql://ats:ats_password@postgres:5432/langfuse_db
      NEXTAUTH_SECRET: langfuse-secret-change-me
      NEXTAUTH_URL: http://localhost:3001
    depends_on:
      postgres:
        condition: service_healthy

  backend:
    build: ./backend
    restart: unless-stopped
    mem_limit: 1g
    ports:
      - '4000:4000'
    environment:
      DATABASE_URL: postgresql://ats:ats_password@postgres:5432/ats_db
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set in environment — run: export JWT_SECRET=$(openssl rand -base64 64)}
      JWT_ISSUER: ats-api
      JWT_AUDIENCE: ats-client
      CORS_ORIGIN: http://localhost:3000
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build: ./frontend
    restart: unless-stopped
    mem_limit: 512m
    ports:
      - '3000:3000'
    environment:
      NEXT_PUBLIC_API_URL: http://backend:4000/api
      NEXT_PUBLIC_USE_MOCKS: 'false'
    depends_on:
      - backend

volumes:
  postgres_data:
