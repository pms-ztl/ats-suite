# ═══════════════════════════════════════════════════════════════════════════════
#  CDC ATS — fully self-contained demo stack. Fresh machine needs ONLY Docker.
#
#    cp .env.example .env        # put your OPENROUTER_API_KEY in it
#    docker compose -f docker-compose.demo.yml up -d --build
#    docker compose -f docker-compose.demo.yml logs -f cloudflared   # see the public URL
#
#  Brings up: Postgres + Redis + NATS + MinIO, runs migrations + seed, starts all
#  14 backend services + the frontend, and opens a free Cloudflare tunnel.
#  Login: priya@pinnacle.demo / PinnacleDemo123!
# ═══════════════════════════════════════════════════════════════════════════════
name: cdc-ats-demo

x-svc-env: &svc-env
  NODE_ENV: production
  REDIS_URL: redis://redis:6379
  NATS_URL: nats://nats:4222
  JWT_SECRET: ${JWT_SECRET:-demo-jwt-secret-min-32-chars-change-me-0123456789}
  INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-demo-internal-service-token}
  OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
  # LLM endpoint is pluggable. Defaults to OpenRouter; for Groq's FREE tier set in
  # .env: OPENROUTER_API_KEY=<groq key>, OPENROUTER_BASE_URL=https://api.groq.com/openai/v1,
  # AI_MODEL_OVERRIDE=llama-3.3-70b-versatile
  OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
  AI_MODEL_OVERRIDE: ${AI_MODEL_OVERRIDE:-}
  # Copilot defaults to the multi-step agentic ReAct loop (several LLM calls).
  # On Groq's 12k tokens/min free tier that blows the limit, so set
  # AGENTIC_COPILOT=0 in .env to use the single-call (pre-fetch + synthesize)
  # path, which stays well under the cap and still answers from real data.
  AGENTIC_COPILOT: ${AGENTIC_COPILOT:-}
  # Skip the optional agentic resume-verifier (a SECOND LLM run per resume) by
  # default in the demo, so each resume costs far fewer tokens and fits tight
  # free-tier budgets. Set AGENTIC_RESUME_VERIFY=1 in .env to re-enable it.
  AGENTIC_RESUME_VERIFY: ${AGENTIC_RESUME_VERIFY:-0}
  # Skip the GitHub-corroborator (another ~6-12k-token LLM call, fired when a
  # resume has a GitHub URL) by default in the demo, for the same reason. This
  # is what pushes a single resume over Groq's 12k tokens/min free cap. Set
  # RESUME_GITHUB_CORROBORATE=1 in .env to re-enable the richer signal.
  RESUME_GITHUB_CORROBORATE: ${RESUME_GITHUB_CORROBORATE:-0}
  ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  CORS_ORIGIN: ${CORS_ORIGIN:-}
  OTEL_DISABLED: "true"
  # Cap LLM output tokens so a screening fits a small OpenRouter credit balance.
  # Hardcoded (not read from .env, which sets 16000) because a low-balance key
  # cannot pre-authorize 16000 tokens. 8000 is ample for a screening verdict.
  AGENT_MAX_OUTPUT_TOKENS: "8000"
  IDENTITY_SERVICE_URL: http://identity-service:4001
  TENANT_SERVICE_URL: http://tenant-service:4002
  BILLING_SERVICE_URL: http://billing-service:4003
  JOB_SERVICE_URL: http://job-service:4004
  CANDIDATE_SERVICE_URL: http://candidate-service:4005
  INTERVIEW_SERVICE_URL: http://interview-service:4006
  RESUME_SERVICE_URL: http://resume-service:4007
  SCREENING_SERVICE_URL: http://screening-service:4008
  NOTIFICATION_SERVICE_URL: http://notification-service:4009
  SEARCH_SERVICE_URL: http://search-service:4010
  AGENT_SERVICE_URL: http://agent-service:4011
  ANALYTICS_SERVICE_URL: http://analytics-service:4012
  COMPLIANCE_SERVICE_URL: http://compliance-service:4013
  # WF3 — assessment-service. Reachable in-network on 4014; the gateway does NOT
  # proxy to it yet (that lands in WF7).
  ASSESSMENT_SERVICE_URL: http://assessment-service:4014
  # Each service's Prisma schema reads its own <SVC>_DATABASE_URL (not the
  # generic DATABASE_URL). Every service gets the full set; each uses only its own.
  IDENTITY_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/identity_db
  TENANT_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/tenant_db
  BILLING_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/billing_db
  JOB_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/job_db
  CANDIDATE_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/candidate_db
  INTERVIEW_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/interview_db
  RESUME_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/resume_db
  SCREENING_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/screening_db
  NOTIFICATION_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/notification_db
  SEARCH_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/search_db
  AGENT_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/agent_db
  ANALYTICS_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/analytics_db
  COMPLIANCE_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/compliance_db
  ASSESSMENT_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/assessment_db

x-svc-build: &svc-build
  context: .
  dockerfile: infra/Dockerfile.service

x-svc-defaults: &svc-defaults
  restart: unless-stopped
  networks: [ats_net]
  depends_on:
    postgres: { condition: service_healthy }
    redis: { condition: service_healthy }
    nats: { condition: service_started }
    migrator: { condition: service_completed_successfully }

networks:
  ats_net: { driver: bridge }
  # WF3 — isolated sandbox network for the Judge0 code-execution sidecar. It has
  # NO route to ats_net: untrusted candidate code must never reach the platform
  # services. `internal: true` also cuts it off from the host/outbound network.
  judge0_net: { driver: bridge, internal: true }

volumes:
  postgres_data:
  redis_data:
  nats_data:
  minio_data:

services:
  # ── Infrastructure ─────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    # WF-I / I6 - ALWAYS-ON Postgres tuning for the apply-spike load test. SAFE on
    # the single host: it only raises ceilings so a burst is admitted instead of
    # stalling on connections or WAL pressure. 14 services x a small Prisma pool
    # (connection_limit=8 each, set on the *_DATABASE_URL below) plus the migrator/
    # seeder/psql tooling can momentarily need well over the stock 100 connections;
    # max_connections=400 gives generous headroom. The bigger WAL buffers + larger
    # max_wal_size keep a write burst (a flood of Candidate/Application inserts) from
    # forcing frequent checkpoints that would stall the spike. shared_buffers /
    # work_mem are modest bumps that fit a typical 8-16GB demo host; tune down via a
    # local override if the host is smaller. These are command flags (no config file
    # to mount), applied on every start; nothing here changes service wiring.
    command:
      - "postgres"
      - "-c"
      - "max_connections=400"
      - "-c"
      - "shared_buffers=512MB"
      - "-c"
      - "work_mem=8MB"
      - "-c"
      - "maintenance_work_mem=128MB"
      - "-c"
      - "wal_buffers=32MB"
      - "-c"
      - "max_wal_size=4GB"
      - "-c"
      - "min_wal_size=1GB"
      - "-c"
      - "checkpoint_completion_target=0.9"
      - "-c"
      - "effective_cache_size=2GB"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres-init.sql:/docker-entrypoint-initdb.d/00-create-dbs.sql:ro
    networks: [ats_net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes: [redis_data:/data]
    networks: [ats_net]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  nats:
    image: nats:2.10-alpine
    restart: unless-stopped
    command: ["-js", "-sd", "/data", "-m", "8222"]
    volumes: [nats_data:/data]
    networks: [ats_net]

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes: [minio_data:/data]
    networks: [ats_net]

  minio-setup:
    image: minio/mc:latest
    restart: "no"
    depends_on:
      minio: { condition: service_started }
    networks: [ats_net]
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 minioadmin minioadmin; do echo waiting-for-minio; sleep 2; done;
      mc mb --ignore-existing local/resumes;
      mc mb --ignore-existing local/ats-incoming;
      echo minio-bucket-ready;
      "

  # ── One-shot: create every service's schema ────────────────────────────────
  migrator:
    build: { context: ., dockerfile: infra/Dockerfile.tools }
    restart: "no"
    command: ["bash", "infra/migrate.sh"]
    networks: [ats_net]
    depends_on:
      postgres: { condition: service_healthy }
    environment:
      IDENTITY_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/identity_db
      TENANT_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/tenant_db
      BILLING_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/billing_db
      JOB_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/job_db
      CANDIDATE_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/candidate_db
      INTERVIEW_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/interview_db
      RESUME_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/resume_db
      SCREENING_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/screening_db
      NOTIFICATION_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/notification_db
      SEARCH_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/search_db
      AGENT_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/agent_db
      ANALYTICS_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/analytics_db
      COMPLIANCE_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/compliance_db
      ASSESSMENT_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/assessment_db

  # ── Backend services (15) ──────────────────────────────────────────────────
  api-gateway:
    <<: *svc-defaults
    build: { <<: *svc-build, args: { SERVICE: api-gateway } }
    environment:
      <<: *svc-env
      PORT: "4000"
      # WF2 — signing secret for the future /embed/* + /api/embed/* embed-token
      # mint/verify. Interpolated from the gitignored .env (never a literal here).
      EMBED_SECRET: ${EMBED_SECRET}
    ports: ["4000:4000"]

  identity-service:
    <<: *svc-defaults
    build: { <<: *svc-build, args: { SERVICE: identity-service } }
    environment:
      <<: *svc-env
      PORT: "4001"
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/identity_db

  tenant-service:
    <<: *svc-defaults
    build: { <<: *svc-build, args: { SERVICE: tenant-service } }
    environment:
      <<: *svc-env
      PORT: "4002"
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/tenant_db

  billing-service:
    <<: *svc-defaults
    build: { <<: *svc-build, args: { SERVICE: billing-service } }
    environment:
      <<: *svc-env
      PORT: "4003"
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/billing_db

  job-service:
    <<: *svc-defaults
    build: { <<: *svc-build, args: { SERVICE: job-service } }
    # WF-I / I1 — overrides the *svc-defaults depends_on (YAML replaces, not deep-
    # merges, a sibling depends_on) to ADD minio-setup so the incoming bucket
    # exists before the presigned-upload-ticket route can hand out tickets. All
    # four base conditions are re-listed verbatim so nothing is lost. The route
    # fails soft to 503 anyway (frontend falls back to multipart apply), so this
    # is a readiness nicety, not a hard correctness dependency.
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      nats: { condition: service_started }
      migrator: { condition: service_completed_successfully }
      minio-setup: { condition: service_completed_successfully }
    environment:
      <<: *svc-env
      PORT: "4004"
      # WF-I / I6 - SMALL, BOUNDED Prisma pool on the HOTTEST service under an apply
      # spike. job-service is the apply data path; without a cap each replica's
      # Prisma pool would open as many connections as it wants and a burst could
      # exhaust Postgres (even at max_connections=400) before the async pipeline
      # absorbs the writes. connection_limit=8 keeps job-service's footprint tiny and
      # predictable (the heavy work is offloaded to the apply-ingest BullMQ worker +
      # candidate-service, NOT held open on a job-service DB connection); pool_timeout
      # makes a momentarily-saturated pool wait briefly rather than error instantly.
      # NOTE: job-service's prisma schema reads env("JOB_DATABASE_URL") (NOT the
      # generic DATABASE_URL), and the *svc-env anchor sets an UNtuned JOB_DATABASE_URL
      # that every service inherits; a sibling key here OVERRIDES the anchor for THIS
      # service only, so the connection_limit must be set on JOB_DATABASE_URL. DATABASE_URL
      # is kept in sync for the per-service convention. The RLS app client reads
      # JOB_APP_DATABASE_URL, which is unset in the demo (RLS client falls back to admin),
      # so JOB_DATABASE_URL is the single pool that matters here. Tune via JOB_DB_CONNECTION_LIMIT.
      JOB_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/job_db?connection_limit=${JOB_DB_CONNECTION_LIMIT:-8}&pool_timeout=20
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/job_db?connection_limit=${JOB_DB_CONNECTION_LIMIT:-8}&pool_timeout=20
      # WF-I / I1 — incoming object storage for the apply fast path. The browser
      # uploads the resume DIRECTLY to this bucket via a presigned POST ticket
      # (GET /api/public/jobs/:slug/upload-ticket). Same MinIO instance + creds as
      # resume-service, but a SEPARATE incoming bucket. When these are unset the
      # ticket route returns 503 and the frontend falls back to multipart apply.
      S3_ENDPOINT: http://minio:9000
      S3_INCOMING_BUCKET: ats-incoming
      S3_REGION: us-east-1
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: minioadmin
      S3_FORCE_PATH_STYLE: "true"
      # WF-I / I6 - OPTIONAL ClamAV scan, run by the apply-ingest worker (in THIS
      # service) before a fast-path resume enters the parse pipeline. OFF BY DEFAULT:
      # CLAMAV_ENABLED unset => the worker skips the scan and the pipeline works with
      # no sidecar. To enable: start the profiled `clamav` service (see below) AND set
      # CLAMAV_ENABLED=true in .env. CLAMAV_HOST defaults to the sidecar's service name.
      # CLAMAV_FAIL_OPEN is OFF by default (fail-CLOSED): when scanning is enabled, a
      # clamd outage is RETRIED by the worker rather than silently passing an unscanned
      # upload; set CLAMAV_FAIL_OPEN=true only if a scanner outage should not block applies.
      CLAMAV_ENABLED: ${CLAMAV_ENABLED:-}
      CLAMAV_HOST: ${CLAMAV_HOST:-clamav}
      CLAMAV_PORT: ${CLAMAV_PORT:-3310}
      CLAMAV_FAIL_OPEN: ${CLAMAV_FAIL_OPEN:-}

  candidate-service:
    <<: *svc-defaults
    build: { <<: *svc-build, args: { SERVICE: candidate-service } }
    environment:
      <<: *svc-env
      PORT: "4005"
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/candidate_db

  interview-service:
    <<: *svc-defaults
    build: { <<: *svc-build, args: { SERVICE: interview-service } }
    environment:
      <<: *svc-env
      PORT: "4006"
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/interview_db

  resume-service:
    build: { <<: *svc-build, args: { SERVICE: resume-service } }
    restart: unless-stopped
    networks: [ats_net]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      nats: { condition: service_started }
      migrator: { condition: service_completed_successfully }
      minio-setup: { condition: service_completed_successfully }
    environment:
      <<: *svc-env
      PORT: "4007"
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/resume_db
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: resumes
      S3_REGION: us-east-1
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: minioadmin
      S3_FORCE_PATH_STYLE: "true"
      # OCR fallback for scanned-image PDFs + image resume uploads (tesseract.js).
      # Slow (~1-3s/page) and downloads a ~12MB model on first use, so it is opt-in.
      ENABLE_OCR: "true"
      # Bulk-archive ingest throughput (parse worker). Higher than the safe
      # single-upload defaults so a 1k-10k file ZIP drains in reasonable time.
      RESUME_PARSE_CONCURRENCY: "8"
      RESUME_PARSE_RATE_MAX: "60"

  screening-service:
    <<: *svc-defaults
    build: { <<: *svc-build, args: { SERVICE: screening-service } }
    environment:
      <<: *svc-env
      PORT: "4008"
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/screening_db
      # Bulk-screening throughput (screening worker). Plan-gating + cost-cap
      # logic is unchanged; this only raises BullMQ concurrency + rate limiter.
      SCREENING_CONCURRENCY: "6"
      SCREENING_RATE_MAX: "30"

  notification-service:
    <<: *svc-defaults
    build: { <<: *svc-build, args: { SERVICE: notification-service } }
    environment:
      <<: *svc-env
      PORT: "4009"
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/notification_db
      # WF2 — AES-256-GCM key for @cdc-ats/common encryptConfig/decryptConfig
      # (TenantIntegration secrets at rest). Interpolated from the gitignored
      # .env (never a literal here). assessment-service (WF3) gets the same var.
      ATS_CONFIG_ENC_KEY: ${ATS_CONFIG_ENC_KEY}

  search-service:
    <<: *svc-defaults
    build: { <<: *svc-build, args: { SERVICE: search-service } }
    environment:
      <<: *svc-env
      PORT: "4010"
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/search_db

  agent-service:
    <<: *svc-defaults
    build: { <<: *svc-build, args: { SERVICE: agent-service } }
    environment:
      <<: *svc-env
      PORT: "4011"
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/agent_db

  analytics-service:
    <<: *svc-defaults
    build: { <<: *svc-build, args: { SERVICE: analytics-service } }
    environment:
      <<: *svc-env
      PORT: "4012"
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/analytics_db

  compliance-service:
    <<: *svc-defaults
    build: { <<: *svc-build, args: { SERVICE: compliance-service } }
    environment:
      <<: *svc-env
      PORT: "4013"
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/compliance_db

  # ── WF3 — assessment-service (online assessments / OA) ─────────────────────
  # Runs + health-checks on 4014. The gateway does NOT proxy to it yet (WF7).
  assessment-service:
    <<: *svc-defaults
    build: { <<: *svc-build, args: { SERVICE: assessment-service } }
    environment:
      <<: *svc-env
      PORT: "4014"
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/assessment_db
      # AES-256-GCM key for @cdc-ats/common encryptConfig/decryptConfig (OA
      # provider secrets at rest). Interpolated from the gitignored .env.
      ATS_CONFIG_ENC_KEY: ${ATS_CONFIG_ENC_KEY}

  # ── WF3 — Judge0 CE code-execution sidecar (PLACEHOLDER, UNROUTED) ─────────
  # Present so the OA coding-question runtime is reserved, but DELIBERATELY cut
  # off: it sits on judge0_net (internal: true) ONLY, with NO route to ats_net,
  # and ALLOW_ENABLE_NETWORK=false so submitted candidate code cannot reach the
  # network. assessment-service does NOT call it until WF7 wires the runner.
  judge0:
    image: judge0/judge0:1.13.1
    restart: unless-stopped
    privileged: true
    networks: [judge0_net]
    environment:
      # Untrusted code must not get a network. Hard off until WF7.
      ALLOW_ENABLE_NETWORK: "false"

  # ── WF-I / I6 - OPTIONAL ClamAV virus-scan sidecar (OFF BY DEFAULT) ─────────
  # NOT started by a plain `docker compose -f docker-compose.demo.yml up`: it is
  # behind the compose profile `clamav`, so the demo stack is unaffected. The app
  # works WITHOUT it (the job-service apply-ingest worker's scan is a no-op + clean
  # unless CLAMAV_ENABLED is set). Enable for a production/perf run with:
  #     CLAMAV_ENABLED=true docker compose -f docker-compose.demo.yml --profile clamav up -d
  # First boot downloads the virus DB (freshclam, ~200-400MB) and can take a few
  # minutes; the healthcheck waits for clamd to accept connections on 3310.
  clamav:
    image: clamav/clamav:stable
    profiles: ["clamav"]
    restart: unless-stopped
    networks: [ats_net]
    # No host port - only the in-network services (job-service) reach clamd.
    healthcheck:
      test: ["CMD-SHELL", "clamdscan --version || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 300s

  # ── WF-I / I6 - OPTIONAL PgBouncer connection pooler (OFF BY DEFAULT) ────────
  # NOT started by default (compose profile `pgbouncer`). The stack connects each
  # service DIRECTLY to Postgres by default; PgBouncer is an opt-in throughput knob
  # for a perf run that wants transaction-pooled connections in front of Postgres.
  #
  #   ENABLE: docker compose -f docker-compose.demo.yml --profile pgbouncer up -d pgbouncer
  #   THEN point a service at it by overriding its DATABASE_URL host:port to
  #        pgbouncer:6432  (e.g. in a local docker-compose.override.yml), NOT here:
  #        the default wiring must keep talking to postgres:5432 so a plain `up` is
  #        unaffected.
  #
  # ── REQUIRED AUDIT BEFORE USE WITH RLS (transaction pooling) ────────────────
  #   This stack scopes RLS via `SET app.current_tenant_id` per request. In
  #   PgBouncer TRANSACTION pooling mode a plain `SET` (session-level) leaks across
  #   pooled clients and BREAKS tenant isolation. Before routing any RLS service
  #   through PgBouncer in transaction mode you MUST confirm the tenant scoping uses
  #   `SET LOCAL ...` inside an explicit transaction (the @cdc-ats/common rlsExtend /
  #   tenantContext path) so the setting is transaction-scoped and reset on COMMIT.
  #   If that audit has not been done, use SESSION pooling (pool_mode=session): the
  #   safe default below, which preserves per-connection session state and is still a
  #   win for connection churn. Do NOT switch a service to transaction mode without
  #   the SET-LOCAL audit.
  pgbouncer:
    image: edoburu/pgbouncer:latest
    profiles: ["pgbouncer"]
    restart: unless-stopped
    networks: [ats_net]
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: postgres
      DB_PASSWORD: postgres
      # SESSION pooling is the SAFE default (preserves SET app.current_tenant_id per
      # connection). Switch to "transaction" ONLY after the SET-LOCAL RLS audit above.
      POOL_MODE: session
      MAX_CLIENT_CONN: "1000"
      DEFAULT_POOL_SIZE: "25"
      AUTH_TYPE: scram-sha-256
    depends_on:
      postgres: { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 6432 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Frontend ───────────────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: infra/Dockerfile.frontend
      args:
        NEXT_PUBLIC_API_URL: /api
        GATEWAY_ORIGIN: http://api-gateway:4000
    restart: unless-stopped
    networks: [ats_net]
    environment:
      NODE_ENV: production
      GATEWAY_ORIGIN: http://api-gateway:4000
      PORT: "3000"
      HOSTNAME: 0.0.0.0
    ports: ["3000:3000"]
    depends_on:
      api-gateway: { condition: service_started }

  # ── One-shot: seed demo data + unlock AI ───────────────────────────────────
  seeder:
    build: { context: ., dockerfile: infra/Dockerfile.tools }
    restart: "no"
    command: ["bash", "infra/seed.sh"]
    networks: [ats_net]
    depends_on:
      api-gateway: { condition: service_started }
    environment:
      API_URL: http://api-gateway:4000/api
      TENANT_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/tenant_db
      BILLING_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/billing_db
      # WF10 / J4 — the demo-entitlement step writes the tenant-default
      # DashboardLayout into identity_db, so the seeder needs this URL too.
      IDENTITY_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/identity_db

  # ── Public tunnel (prints the URL in its logs) ─────────────────────────────
  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    networks: [ats_net]
    command: tunnel --no-autoupdate --url http://frontend:3000
    depends_on:
      frontend: { condition: service_started }
